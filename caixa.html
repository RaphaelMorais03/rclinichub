<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa — Amor Saúde Pirituba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="js/firebase-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <style>
    :root{--navy:#0A1F44;--navy-mid:#122b5e;--red:#C62828;--red-h:#ad1f1f;--teal:#61C1D0;--teal-h:#4fa8b8;--green:#15803d;--green-bg:#dcfce7;--amber:#b45309;--amber-bg:#fef3c7;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--shadow:0 4px 20px rgba(10,31,68,.1);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;color:var(--gray-800);min-height:100vh;}
    .red-bar{height:3px;background:var(--red);position:fixed;top:0;left:0;right:0;z-index:200;}
    .s-header{background:white;border-bottom:2px solid var(--gray-200);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:3px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .s-logo{display:flex;align-items:center;gap:12px;}
    .s-logo-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .s-logo-icon img{width:100%;height:100%;object-fit:contain;}
    .s-logo-name{font-size:16px;font-weight:800;color:var(--navy);}
    .s-logo-sub{font-size:10px;color:var(--gray-400);}
    .header-right{display:flex;align-items:center;gap:10px;}
    .date-badge{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--gray-600);}
    .back-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
    .back-btn:hover{background:var(--red-h);}
    .content{max-width:1100px;margin:0 auto;padding:24px 24px 60px;}
    .panel{background:white;border:1px solid var(--gray-200);border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow);}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--gray-100);}
    .panel-title{font-size:15px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;}
    .panel-title i{color:var(--red);}
    .user-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border-radius:16px;padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(10,31,68,.25);}
    .user-banner-info{display:flex;flex-direction:column;gap:4px;}
    .user-banner-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;}
    .user-banner-name{font-size:22px;font-weight:900;color:white;letter-spacing:-.3px;}
    .user-banner-date{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;}
    .user-banner-icon{width:56px;height:56px;background:rgba(255,255,255,.12);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;}
    .caixa-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
    .caixa-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    .caixa-c{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:12px;padding:14px;}
    .caixa-c.sobra{border-color:#fde68a;background:#fffbeb;}
    .caixa-lbl{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:5px;}
    .caixa-c.sobra .caixa-lbl{color:var(--amber);}
    .caixa-inp{width:100%;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:9px;font-family:inherit;font-size:15px;font-weight:800;color:var(--navy);background:white;outline:none;transition:border-color .2s;}
    .caixa-inp:focus{border-color:var(--navy);}
    .saldo-bar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--navy);border-radius:12px;color:white;margin-bottom:16px;}
    .f-input,.f-select{padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:9px;font-family:inherit;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .2s;width:100%;}
    .f-input:focus,.f-select:focus{border-color:var(--navy);background:white;}
    .f-label{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--gray-500);display:block;margin-bottom:5px;}
    .btn-p{padding:9px 18px;background:var(--navy);color:white;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s,transform .15s;}
    .btn-p:hover{background:var(--navy-mid);transform:translateY(-1px);}
    .btn-s{padding:9px 14px;background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200);border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-s:hover{background:var(--gray-200);}
    .btn-teal{padding:9px 18px;background:var(--teal);color:white;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s;}
    .btn-teal:hover{background:var(--teal-h);}
    .btn-r{padding:9px 18px;background:var(--red);color:white;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s;}
    .btn-r:hover{background:var(--red-h);}
    .preview-screen{display:none;flex-direction:column;height:100vh;background:#e5e7eb;position:fixed;inset:0;z-index:400;}
    .preview-screen.open{display:flex;}
    .preview-bar{background:white;border-bottom:2px solid var(--gray-200);padding:12px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .preview-bar-title{font-size:14px;font-weight:800;color:var(--navy);margin-right:auto;}
    .preview-wrap{flex:1;overflow-y:auto;padding:24px;}
    .print-doc{width:210mm;min-height:297mm;padding:1.5cm;background:white;margin:0 auto;box-shadow:0 10px 40px rgba(0,0,0,.15);font-family:system-ui,-apple-system,sans-serif;}
    .info-box{background:#eff6ff;border:1px solid #c7d2fe;border-radius:12px;padding:14px;margin-bottom:16px;font-size:12px;color:#3730a3;line-height:1.6;}
    .vale-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gray-100);}
    .vale-item:last-child{border-bottom:none;}
    @media(max-width:900px){.caixa-nums{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){.caixa-grid{grid-template-columns:1fr;}.content{padding:14px 14px 60px;}.print-doc{width:100%;}.user-banner{flex-direction:column;align-items:flex-start;gap:12px;}}
    @media print{.preview-bar{display:none!important;}.preview-wrap{padding:0!important;}.print-doc{box-shadow:none!important;margin:0!important;width:100%!important;}}
  </style>
</head>
<body>
  <div class="red-bar"></div>

  <!-- TELA PRINCIPAL -->
  <div id="telaMain">
    <div class="s-header">
      <div class="s-logo">
        <div class="s-logo-icon"><img src="assets/favicon.png" alt="Logo" id="headerLogo"></div>
        <div><div class="s-logo-name">Amor Saúde</div><div class="s-logo-sub">Caixa · Pirituba</div></div>
      </div>
      <div class="header-right">
        <div class="date-badge" id="dateBadge">—</div>
        <button class="back-btn" onclick="irPara('login.html')"><i class="fas fa-home"></i> Portal</button>
      </div>
    </div>

    <div class="content">
      <div class="user-banner">
        <div class="user-banner-info">
          <div class="user-banner-label">Responsável pelo caixa</div>
          <div class="user-banner-name" id="nomeUsuario">—</div>
          <div class="user-banner-date" id="dataHoje">—</div>
        </div>
        <div class="user-banner-icon"><i class="fas fa-cash-register"></i></div>
      </div>

      <div class="caixa-grid">
        <!-- Controle de Caixa -->
        <div>
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fas fa-coins"></i> Controle de Caixa</div>
            </div>
            <div class="caixa-nums">
              <div class="caixa-c"><div class="caixa-lbl">Fundo de Caixa</div><input class="caixa-inp" id="cFundo" placeholder="0,00" oninput="mascaraMoeda(this);salvarCx()"></div>
              <div class="caixa-c"><div class="caixa-lbl">Entradas</div><input class="caixa-inp" id="cEntradas" placeholder="0,00" oninput="mascaraMoeda(this);salvarCx()"></div>
              <div class="caixa-c"><div class="caixa-lbl">Saídas</div><input class="caixa-inp" id="cSaidas" placeholder="0,00" oninput="mascaraMoeda(this);salvarCx()"></div>
              <div class="caixa-c sobra"><div class="caixa-lbl">Sobra / Troco pendente</div><input class="caixa-inp" id="cSobra" placeholder="0,00" oninput="mascaraMoeda(this);salvarCx()" style="border-color:#fde68a;"></div>
            </div>
            <div class="saldo-bar">
              <span style="font-size:13px;font-weight:700;opacity:.6;">Saldo Atual</span>
              <span style="font-size:22px;font-weight:900;letter-spacing:-1px;" id="cSaldo">R$ 0,00</span>
            </div>

            <div class="panel-title" style="margin-bottom:12px;"><i class="fas fa-receipt"></i> Registro de Troco / Vale</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
              <div><label class="f-label">Paciente</label><input class="f-input" id="vPac" placeholder="Nome" style="margin-top:4px;"></div>
              <div><label class="f-label">CPF</label><input class="f-input" id="vCpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)" maxlength="14" style="margin-top:4px;"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
              <div><label class="f-label">Especialidade / Médico</label><input class="f-input" id="vEsp" placeholder="Ex: Cardiologia — Dr. Juan" style="margin-top:4px;"></div>
              <div><label class="f-label">Valor do Troco</label><input class="f-input" id="vVal" placeholder="0,00" oninput="mascaraMoeda(this)" style="margin-top:4px;"></div>
            </div>
            <button class="btn-p" onclick="addVale()" style="margin-bottom:16px;"><i class="fas fa-plus"></i> Registrar Troco</button>
            <div id="valeList"></div>
          </div>
        </div>

        <!-- Gerar Relatório -->
        <div>
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fas fa-file-lines"></i> Relatório de Caixa</div>
            </div>
            <div class="info-box">
              <i class="fas fa-info-circle"></i> No AMEI: <strong>Caixa → Detalhes → Ctrl+A → Ctrl+C</strong> → cole abaixo e clique em Gerar.
            </div>
            <label class="f-label" style="margin-bottom:6px;">Cole os dados do caixa (AMEI)</label>
            <textarea id="cxPaste" style="width:100%;height:280px;padding:14px;border:1.5px solid var(--gray-200);border-radius:12px;font-family:monospace;font-size:12px;resize:vertical;outline:none;transition:border-color .2s;" placeholder="Cole aqui os dados copiados do sistema AMEI..." onfocus="this.style.borderColor='var(--navy)'" onblur="this.style.borderColor='var(--gray-200)'"></textarea>
            <div style="margin-top:14px;">
              <button class="btn-r" id="btnGerar" onclick="gerarRelatorio()" style="width:100%;justify-content:center;padding:14px;font-size:15px;"><i class="fas fa-chart-bar"></i> Gerar Relatório</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TELA DE PREVIEW DO RELATÓRIO -->
  <div class="preview-screen" id="telaPreview">
    <div class="preview-bar">
      <button class="btn-s" onclick="voltarMain()"><i class="fas fa-arrow-left"></i> Voltar</button>
      <div class="preview-bar-title">Relatório de Caixa</div>
      <button class="btn-teal" onclick="imprimirRelatorio()"><i class="fas fa-print"></i> Imprimir</button>
      <button class="btn-s" onclick="limparRelatorio()"><i class="fas fa-trash"></i> Limpar</button>
    </div>
    <div class="preview-wrap">
      <div class="print-doc" id="relatorioDoc"></div>
    </div>
  </div>

  <script>
    /* ── HELPERS ── */
    function pv(v) { return parseFloat((v||'0').replace(/\./g,'').replace(',','.')) || 0; }
    function fm(v) { return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
    function normNome(s) {
      return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
    }
    function parseCsvLine(line) {
      // Usado para dados tab-separados do AMEI — mantido separado
      const result = [];
      let i = 0, field = '';
      while (i <= line.length) {
        if (i === line.length) { result.push(field.trim()); break; }
        const ch = line[i];
        if (ch === '"') {
          i++;
          while (i < line.length) {
            if (line[i] === '"' && line[i+1] === '"') { field += '"'; i += 2; }
            else if (line[i] === '"') { i++; break; }
            else { field += line[i++]; }
          }
          while (i < line.length && line[i] !== ',') i++;
        } else if (ch === ',') {
          result.push(field.trim()); field = ''; i++;
        } else {
          field += ch; i++;
        }
      }
      return result;
    }

    // Parser de CSV completo (RFC 4180) — respeita campos multi-linha entre aspas
    function parseCsv(txt) {
      const rows = [];
      let i = 0, field = '', row = [], inQ = false;
      const n = txt.length;
      while (i <= n) {
        if (i === n) {
          row.push(field.trim());
          if (row.some(f => f !== '')) rows.push(row);
          break;
        }
        const ch = txt[i];
        if (inQ) {
          if (ch === '"') {
            if (txt[i+1] === '"') { field += '"'; i += 2; } // "" → "
            else { inQ = false; i++; }                       // fecha aspas
          } else { field += ch; i++; }                       // newline dentro de aspas = parte do campo
        } else {
          if      (ch === '"')  { inQ = true; i++; }
          else if (ch === ',')  { row.push(field.trim()); field = ''; i++; }
          else if (ch === '\r') { i++; }
          else if (ch === '\n') {
            row.push(field.trim()); field = '';
            if (row.some(f => f !== '')) rows.push(row);
            row = []; i++;
          } else { field += ch; i++; }
        }
      }
      return rows;
    }

    /* ── INIT ── */
    const DIAS  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    const nowD  = new Date();
    window.TK_FB = nowD.getFullYear() + '-' + String(nowD.getMonth()+1).padStart(2,'0') + '-' + String(nowD.getDate()).padStart(2,'0');

    window.caixa      = {fundo:0, entradas:0, saidas:0, sobra:0};
    window.vales      = [];
    window._planilhaNfUrl = null;

    function init() {
      const ds = DIAS[nowD.getDay()] + ', ' + nowD.getDate() + ' de ' + MESES[nowD.getMonth()] + ' de ' + nowD.getFullYear();
      document.getElementById('dateBadge').textContent = DIAS[nowD.getDay()] + ', ' + nowD.getDate() + '/' + String(nowD.getMonth()+1).padStart(2,'0');
      document.getElementById('dataHoje').textContent  = ds;
      document.getElementById('nomeUsuario').textContent = sessionStorage.getItem('usuario') || '—';
      renderCaixa();
      renderVales();
    }

    /* ── CAIXA ── */
    window.salvarCx = function() {
      window.caixa.fundo    = pv(document.getElementById('cFundo').value);
      window.caixa.entradas = pv(document.getElementById('cEntradas').value);
      window.caixa.saidas   = pv(document.getElementById('cSaidas').value);
      window.caixa.sobra    = pv(document.getElementById('cSobra').value);
      if (window.fbSet) window.fbSet('operacao/' + (window.USER_UID||'_') + '/caixa/' + window.TK_FB, window.caixa);
      updSaldo();
    };
    window.updSaldo = function() {
      document.getElementById('cSaldo').textContent = fm(window.caixa.entradas - window.caixa.saidas);
    };
    window.renderCaixa = function() {
      const fmtV = v => v ? v.toFixed(2).replace('.',',') : '';
      document.getElementById('cFundo').value    = fmtV(window.caixa.fundo);
      document.getElementById('cEntradas').value = fmtV(window.caixa.entradas);
      document.getElementById('cSaidas').value   = fmtV(window.caixa.saidas);
      document.getElementById('cSobra').value    = fmtV(window.caixa.sobra);
      updSaldo();
    };

    /* ── VALES ── */
    window.addVale = function() {
      const p = document.getElementById('vPac').value.trim();
      if (!p) { toast('Informe o paciente', 'error'); return; }
      window.vales.push({
        id: Date.now()+'', pac: p,
        cpf: document.getElementById('vCpf').value,
        esp: document.getElementById('vEsp').value,
        val: document.getElementById('vVal').value,
        hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
      });
      if (window.fbSet) window.fbSet('operacao/' + (window.USER_UID||'_') + '/vales/' + window.TK_FB, window.vales);
      ['vPac','vCpf','vEsp','vVal'].forEach(x => document.getElementById(x).value = '');
      renderVales();
      toast('Troco registrado!', 'success');
    };
    window.delVale = function(id) {
      window.vales = window.vales.filter(v => v.id !== id);
      if (window.fbSet) window.fbSet('operacao/' + (window.USER_UID||'_') + '/vales/' + window.TK_FB, window.vales);
      renderVales();
    };
    window.renderVales = function() {
      const el = document.getElementById('valeList');
      if (!window.vales.length) {
        el.innerHTML = '<div style="text-align:center;padding:12px;color:var(--gray-400);font-size:12px;">Sem trocos registrados hoje.</div>';
        return;
      }
      el.innerHTML = '<div style="border:1.5px solid var(--gray-200);border-radius:11px;overflow:hidden;">' +
        window.vales.map(v =>
          '<div class="vale-item">' +
          '<div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--navy);">' + esc(v.pac) + '</div>' +
          '<div style="font-size:11px;color:var(--gray-400);">' + (v.cpf ? esc(v.cpf) + ' · ' : '') + esc(v.esp||'—') + ' · ' + v.hora + '</div></div>' +
          '<div style="font-size:14px;font-weight:800;color:var(--amber);">💸 ' + (v.val || '—') + '</div>' +
          '<button onclick="delVale(\'' + v.id + '\')" style="width:26px;height:26px;background:rgba(198,40,40,.08);border:none;border-radius:6px;cursor:pointer;color:var(--red);font-size:10px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-trash"></i></button>' +
          '</div>').join('') + '</div>';
    };

    /* ── PARSE CAIXA ── */
    function parseCaixa(txt) {
      // Normaliza forma de pagamento via regex — captura qualquer variante
      function normForma(raw) {
        if (!raw) return 'Outros';
        const r = raw.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
        if (/pix/.test(r))                          return 'PIX';
        if (/dinheiro|especie|espécie/.test(r))     return 'Dinheiro';
        if (/credit|crédito|credito/.test(r))       return 'Cartão de Crédito';
        if (/debit|débito|debito/.test(r))          return 'Cartão de Débito';
        return raw.trim() || 'Outros';
      }
      function parseBRL(s) {
        if (!s) return 0;
        return Math.abs(parseFloat((s+'').trim().replace(/\s/g,'').replace(/\./g,'').replace(',','.')) || 0);
      }
      function fmtBRL(v) { return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

      const lancamentos = [], transferencias = [], totForma = {};
      let dinheiroEntregar = null;
      const smD = txt.match(/Valor em dinheiro a entregar\s*:\s*(R\$\s*[\d.,]+)/i);
      if (smD) dinheiroEntregar = smD[1].trim();

      for (const linha of txt.split('\n')) {
        const l = linha.trim();
        if (!l || !/^\d{2}\/\d{2}\/\d{4}/.test(l)) continue;
        const p = l.split(/\t/);
        if (p.length < 5) continue; // mínimo: data, desc, tipo, forma, valor

        const dtHora   = (p[0]||'').trim();
        const hora     = dtHora.length > 11 ? dtHora.slice(11,16) : dtHora;
        const tipo     = (p[2]||'').trim().toLowerCase();
        const formaR   = (p[3]||'').trim();
        const origem   = (p[4]||'').trim().toUpperCase();
        const paciente = (p[7]||'').trim();

        // Valor: tenta p[8], depois última coluna que contenha número
        let valor = parseBRL(p[8]);
        if (valor === 0) valor = parseBRL(p[p.length - 1]);
        if (valor === 0) continue;

        if (/saldo inicial/i.test(origem)) continue;

        const forma  = normForma(formaR);
        const isRec  = tipo.startsWith('receit');
        // Despesa: captura Despesa, Saída, Saida, Sangria, Retirada e similares
        const isDesp = /^desp|^saíd|^said|^saida|^sangr|^retir/.test(tipo);
        const isTE   = origem.includes('TE_CAIXA');
        const isTS   = origem.includes('TS_CAIXA');

        // Transferências internas de caixa (apenas se NÃO forem receita/despesa)
        if ((isTE || isTS) && !isRec && !isDesp) {
          transferencias.push({hora, tipo:isTE?'Entrada':'Saída', forma, valor, fmtValor:fmtBRL(valor)});
        } else {
          if (!totForma[forma]) totForma[forma] = {entrada:0, saida:0};
          if (isRec)  totForma[forma].entrada += valor;
          if (isDesp) totForma[forma].saida   += valor;
          lancamentos.push({
            dtHora, hora,
            tipo:       isRec ? 'Receita' : (isDesp ? 'Despesa' : tipo),
            forma,
            descricao:  (p[1]||'').trim(),
            lancadoPor: (p[6]||'').trim(),
            paciente:   paciente || '—',
            valor,
            fmtValor:   fmtBRL(valor),
            isDespesa:  isDesp,
            isTroco:    false
          });
        }
      }
      function fmtBRL2(v) { return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
      return {lancamentos, transferencias, totForma, dinheiroEntregar, fmtBRL:fmtBRL2};
    }

    /* ── PLANILHA NF (Google Sheets CSV) ── */
    // Converte qualquer URL do Sheets publicado para versão CSV
    function normalizeSheetUrl(url) {
      if (!url) return url;
      url = url.trim();
      if (url.includes('output=csv')) return url;          // já está correto
      // pubhtml → pub?output=csv  (preserva ?gid= se houver)
      if (url.includes('pubhtml')) {
        const gid = (url.match(/[?&]gid=(\d+)/) || [])[1];
        const base = url.replace(/pubhtml.*$/, 'pub?output=csv');
        return gid ? base + '&gid=' + gid : base;
      }
      // /pub sem output=csv
      if (/\/pub(\?|$)/.test(url)) {
        return url + (url.includes('?') ? '&' : '?') + 'output=csv';
      }
      return url;
    }

    // Converte YYYY-MM-DD → DD/MM/YYYY (nome das abas da planilha)
    function tkParaNomeAba(tkFb) {
      if (!tkFb || tkFb.length !== 10) return null;
      const [y, m, d] = tkFb.split('-');
      return d + '/' + m + '/' + y;
    }

    // fetch com timeout (ms) — aborta se demorar demais
    function fetchComTimeout(url, ms) {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms));
      return Promise.race([fetch(url), timeout]);
    }

    // Retorna { mapa, erro, detalhes } para diagnóstico
    // caixaDataStr: "DD/MM/YYYY" extraída dos lançamentos do AMEI (tem precedência sobre a data de hoje)
    async function carregarNotasFiscais(atendenteFiltro, caixaDataStr) {
      const vazio = (erro, detalhes) => ({ mapa: {}, erro, detalhes: detalhes || '' });
      if (!window._planilhaNfUrl) return vazio('sem_url');
      try {
        const csvBase = normalizeSheetUrl(window._planilhaNfUrl).replace(/&sheet=[^&]*/,'');

        // Usa a data dos lançamentos do AMEI; fallback para data de hoje
        const nomeAba = caixaDataStr || tkParaNomeAba(window.TK_FB);
        let csvUrl = csvBase;
        let abaInfo = '';
        if (nomeAba) {
          try {
            const pubhtmlUrl = csvBase.replace(/pub\?output=csv.*$/, 'pubhtml');
            const rh = await fetchComTimeout(pubhtmlUrl, 4000);
            if (rh.ok) {
              const html = await rh.text();
              const tabRe = /items\.push\(\{name:\s*"((?:[^"\\]|\\.)+?)",\s*pageUrl:\s*"([^"]+)"/g;
              let m;
              while ((m = tabRe.exec(html)) !== null) {
                const tabName = m[1].replace(/\\\//g, '/').replace(/\\\\/g, '\\');
                const gidM   = m[2].match(/gid=(-?\d+)/);
                if (gidM && tabName === nomeAba) {
                  csvUrl  = csvBase.replace(/&gid=\d+/, '') + '&gid=' + gidM[1];
                  abaInfo = ' · aba ' + nomeAba;
                  break;
                }
              }
            }
          } catch(e) { /* timeout ou erro de rede — usa aba padrão */ }

          if (csvUrl === csvBase) abaInfo = ' · aba ' + nomeAba + ' não encontrada, usando planilha geral';
        }

        let r;
        try {
          r = await fetchComTimeout(csvUrl, 5000);
        } catch(e) {
          return vazio('fetch_erro', e.message);
        }
        if (!r.ok) return vazio('http_erro', 'HTTP ' + r.status);
        const txt = await r.text();

        // Verifica se voltou HTML em vez de CSV (URL errada ainda)
        if (txt.trim().startsWith('<')) return vazio('retornou_html', 'A URL retornou HTML — verifique se publicou como CSV');

        // Usa parseCsv completo (RFC 4180) — suporta células com quebra de linha interna
        const todasLinhas = parseCsv(txt);
        if (todasLinhas.length < 2) return vazio('vazio', 'Planilha sem dados');

        // Procura a linha de cabeçalho real (pode não ser a linha 0 se houver título)
        let headerIdx = -1;
        let rawHeader = [], header = [];
        for (let i = 0; i < Math.min(10, todasLinhas.length); i++) {
          rawHeader = todasLinhas[i];
          header    = rawHeader.map(h => normNome(h).replace(/\s/g,''));
          const temNome = header.some(h => h === 'nome' || h.includes('paciente'));
          const temNf   = header.some(h => h.includes('nf') || h.includes('nota') || h.includes('numero'));
          if (temNome && temNf) { headerIdx = i; break; }
        }

        if (headerIdx < 0) return vazio('col_header', 'Cabeçalho não encontrado nas 10 primeiras linhas. Verifique se a planilha tem colunas NOME e N° NOTA FISCAL');

        const iNome  = header.findIndex(h => h === 'nome' || h.includes('paciente'));
        const iNf    = header.findIndex(h => h.includes('nf') || h.includes('nota') || h.includes('numero'));
        const iAtend = header.findIndex(h =>
          h.includes('atendente') || h.includes('operador') ||
          h.includes('colaborador') || h.includes('responsavel') ||
          h.includes('emissor') || h.includes('usuario')
        );

        // Prepara filtro por colaborador (primeiro nome)
        const fnFiltro = atendenteFiltro ? normNome(atendenteFiltro).split(' ')[0] : null;

        // Monta mapa nome→nf
        const mapaFiltrado = {};
        const mapaTudo     = {};
        for (let i = headerIdx + 1; i < todasLinhas.length; i++) {
          const cols = todasLinhas[i];
          const nome = normNome(cols[iNome] || '');
          const nf   = (cols[iNf] || '').replace(/"/g,'').trim();
          if (!nome || !nf) continue;
          mapaTudo[nome] = nf;

          if (iAtend >= 0 && fnFiltro) {
            const nomeAtend = normNome(cols[iAtend] || '');
            const fnAtend   = nomeAtend.split(' ')[0];
            if (fnAtend && fnFiltro && !nomeAtend.includes(fnFiltro) && !fnFiltro.includes(fnAtend)) {
              continue; // outro operador
            }
          }
          mapaFiltrado[nome] = nf;
        }

        // Fallback: se o filtro zerou tudo (ex: admin testando), usa todas as NFs
        const usouFiltro = iAtend >= 0 && fnFiltro && Object.keys(mapaTudo).length > 0;
        const mapa = (usouFiltro && Object.keys(mapaFiltrado).length === 0) ? mapaTudo : mapaFiltrado;
        const obs  = usouFiltro && Object.keys(mapaFiltrado).length === 0
          ? Object.keys(mapa).length + ' NFs (exibindo todas — operador não encontrado na planilha)' + abaInfo
          : Object.keys(mapa).length + ' NFs' + (usouFiltro ? ' deste operador' : '') + abaInfo;

        return { mapa, erro: null, detalhes: obs };
      } catch(e) {
        return vazio('excecao', e.message);
      }
    }
    function buscarNf(paciente, mapa) {
      if (!paciente || paciente === '—' || !Object.keys(mapa).length) return null;
      const np = normNome(paciente);

      // 1. Match exato
      if (mapa[np]) return mapa[np];

      // 2. Um contém o outro (substring)
      for (const [k, v] of Object.entries(mapa)) {
        if (np.length > 3 && k.length > 3 && (np.includes(k) || k.includes(np))) return v;
      }

      // 3. Palavras em comum (≥2 palavras com ≥4 letras cada)
      const wpac = np.split(/\s+/).filter(w => w.length >= 4);
      if (wpac.length >= 2) {
        for (const [k, v] of Object.entries(mapa)) {
          const wnf = k.split(/\s+/).filter(w => w.length >= 4);
          const comuns = wpac.filter(w => wnf.includes(w));
          if (comuns.length >= 2) return v;
        }
      }

      // Log para diagnóstico quando há NFs no mapa mas não houve match
      console.warn('[buscarNf] SEM MATCH — pac:', JSON.stringify(np), '| mapa:', JSON.stringify(Object.fromEntries(Object.entries(mapa).slice(0,5))));
      return null;
    }

            '<th style="border:1px solid #374151;padding:7px 8px;font-size:9px;color:rgba(255,255,255,.7);">Forma</th>' +
            '<th style="border:1px solid #374151;padding:7px 8px;font-size:9px;color:rgba(255,255,255,.7);">Descrição</th>' +
            '<th style="border:1px solid #374151;padding:7px 8px;font-size:9px;color:rgba(255,255,255,.7);">Lançado por</th>' +
            '<th style="border:1px solid #374151;padding:7px 8px;font-size:9px;color:rgba(255,255,255,.7);">Paciente</th>' +
            '<th style="border:1px solid #374151;padding:7px 8px;text-align:right;font-size:9px;color:rgba(255,255,255,.7);">Valor</th>' +
            thNf +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        /* Rodapé */
        '<div style="padding-top:.8rem;border-top:2px solid #61C1D0;display:flex;justify-content:space-between;align-items:center;">' +
          '<div style="font-size:10px;color:#888;">' + ds + ' às ' + hr + '</div>' +
          '<div style="font-size:10px;font-weight:800;color:#374151;text-align:center;">RESPONSÁVEL: ' + esc(aten.toUpperCase()) + '</div>' +
          '<div style="font-size:10px;color:#888;text-align:right;">' + esc(clinicaNome) + '</div>' +
        '</div>';

      document.getElementById('telaPreview').classList.add('open');
      _restoreBtn();

      // Carrega NFs em segundo plano (máx ~9s) — não bloqueia a exibição do relatório
      if (temNf) {
        const _ind = () => document.getElementById('nfIndicador');
        // Guarda referência local para o array — closure segura
        const _lancamentos = todosLancamentos.slice();

        carregarNotasFiscais(sessionStorage.getItem('usuario'), caixaDataAmei)
          .then(nfResult => {
            const mapa = nfResult.mapa;
            const ind  = _ind();
            if (!Object.keys(mapa).length) {
              if (ind) ind.innerHTML = nfResult.erro && nfResult.erro !== 'sem_url'
                ? '<span style="color:#b45309;">⚠️ ' + esc(nfResult.detalhes || nfResult.erro) + '</span>'
                : '<span style="color:#94a3b8;font-size:11px;">NF não disponível para esta data</span>';
              // Limpa ⋯ das células
              _lancamentos.forEach((_, i) => {
                const c = document.getElementById('nfc' + i);
                if (c) c.innerHTML = '<span style="color:#9ca3af;font-size:10px;">—</span>';
              });
              return;
            }
            // Preenche cada célula NF
            let encontradas = 0;
            _lancamentos.forEach((l, i) => {
              const cell = document.getElementById('nfc' + i);
              if (!cell) return;
              const nf = buscarNf(l.paciente, mapa);
              if (nf) encontradas++;
              cell.innerHTML = nf
                ? '<span style="background:#dcfce7;color:#15803d;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:800;">' + esc(nf) + '</span>'
                : '<span style="color:#9ca3af;font-size:10px;">—</span>';
            });
            // Atualiza indicador
            if (ind) ind.innerHTML = '<span style="color:#15803d;"><i class="fas fa-check-circle"></i> ' + encontradas + ' NF(s) encontrada(s) — ' + esc(nfResult.detalhes) + '</span>';
          })
          .catch(e => {
            const ind = _ind();
            if (ind) ind.innerHTML = '<span style="color:#b45309;">⚠️ Planilha NF não respondeu a tempo</span>';
            // Limpa ⋯
            todosLancamentos.forEach((_, i) => {
              const c = document.getElementById('nfc' + i);
              if (c) c.innerHTML = '<span style="color:#9ca3af;font-size:10px;">—</span>';
            });
          });
      }

      } catch(err) {
        console.error('[gerarRelatorio] erro:', err);
        toast('Erro ao gerar relatório: ' + (err.message || err), 'error');
        _restoreBtn();
      }
    };

    window.voltarMain = function() { document.getElementById('telaPreview').classList.remove('open'); };
    window.limparRelatorio = function() {
      if (!confirm('Limpar o relatório e voltar?')) return;
      document.getElementById('cxPaste').value = '';
      document.getElementById('relatorioDoc').innerHTML = '';
      document.getElementById('telaPreview').classList.remove('open');
    };
    window.imprimirRelatorio = function() {
      const win = window.open('', '_blank');
      if (!win) { toast('Permita pop-ups para imprimir', 'error'); return; }
      const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}@page{size:A4;margin:1.5cm;}body{font-family:system-ui,-apple-system,sans-serif;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #d1d5db;padding:5px 7px;}</style></head><body><div style="padding:0;">' + document.getElementById('relatorioDoc').innerHTML + '</div><sc' + 'ript>window.onload=function(){setTimeout(function(){window.print();},300);}<' + '/script></body></html>';
      win.document.write(html);
      win.document.close();
    };
  </script>

  <script type="module">
    import { initializeApp }               from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    const _app  = initializeApp(window.FIREBASE_CONFIG);
    const _auth = getAuth(_app);
    const _db   = getDatabase(_app);
    window.initFirebaseUtils(_db, ref, get);
    window.fbSet = (path, data) => set(ref(_db, path), data);

    const _unsubs = [];
    window.addEventListener('beforeunload', () => _unsubs.forEach(fn => { try { fn(); } catch(e){} }));
    const _on = (r, cb) => { const u = onValue(r, cb); _unsubs.push(u); return u; };

    onAuthStateChanged(_auth, user => {
      if (!user) { irPara('login.html'); return; }

      // Identificador único do usuário — separa dados de caixa por login
      window.USER_UID = user.uid;

      set(ref(_db, 'admin_logs/' + Date.now()), {
        tipo:'info', msg:(user.email||user.uid)+' acessou o Caixa', ts:new Date().toISOString()
      }).catch(()=>{});

      carregarLogoGlobal(['#headerLogo']);

      // Cabeçalho do caixa
      get(ref(_db, 'admin/caixaHeader')).then(snap => {
        const d = snap.val();
        if (d && d.dataUrl) sessionStorage.setItem('caixaHeaderImg', d.dataUrl);
      }).catch(()=>{});

      // URL da planilha NF (Google Sheets publicado como CSV)
      get(ref(_db, 'admin/configCaixa/planilhaUrl')).then(snap => {
        if (snap.val()) window._planilhaNfUrl = snap.val();
      }).catch(()=>{});

      // Dados de caixa em tempo real — separado por usuário (user.uid / data)
      _on(ref(_db, `operacao/${user.uid}/caixa/${window.TK_FB}`), snap => {
        window.caixa = snap.val() || {fundo:0, entradas:0, saidas:0, sobra:0};
        if (!window.caixa.sobra) window.caixa.sobra = 0;
        if (typeof window.renderCaixa === 'function') window.renderCaixa();
        if (typeof window.updSaldo    === 'function') window.updSaldo();
      });

      // Vales em tempo real — separado por usuário (user.uid / data)
      _on(ref(_db, `operacao/${user.uid}/vales/${window.TK_FB}`), snap => {
        window.vales = snap.val() || [];
        if (typeof window.renderVales === 'function') window.renderVales();
      });

      init();
    });
  </script>
</body>
</html>
