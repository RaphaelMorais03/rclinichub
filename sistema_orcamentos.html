<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos — Amor Saúde Pirituba</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/firebase-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#f0f4f8;--surface:#fff;--navy:#0A1F44;--red:#C62828;--red-h:#ad1f1f;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-800:#1e293b;--green:#15803d;--amber:#b45309;--purple:#6d28d9;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--gray-800);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
    .red-bar{height:3px;background:var(--red);flex-shrink:0;}
    header{background:#fff;border-bottom:2px solid var(--gray-200);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-img{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0;}
    .logo-img img{width:100%;height:100%;object-fit:contain;}
    .logo-name{font-size:15px;font-weight:800;color:var(--navy);}
    .logo-sub{font-size:10px;color:var(--gray-400);}
    .layout{display:grid;grid-template-columns:260px 1fr 310px;flex:1;overflow:hidden;}
    .sidebar{background:var(--gray-50);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-section{padding:12px 14px;border-bottom:1px solid var(--gray-200);}
    .sidebar-scroll{flex:1;overflow-y:auto;}
    .sidebar-scroll::-webkit-scrollbar{width:4px;}
    .sidebar-scroll::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px;}
    .s-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:8px;}
    .search-wrap{position:relative;}
    .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:12px;pointer-events:none;}
    #searchInput{width:100%;padding:8px 30px 8px 30px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:#fff;color:var(--gray-800);transition:border-color .2s;}
    #searchInput:focus{border-color:var(--navy);}
    #clearBtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--gray-300);border:none;color:var(--gray-600);cursor:pointer;font-size:9px;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;}
    #clearBtn.visible{display:flex;}
    .chip{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--gray-600);transition:all .15s;border:1px solid transparent;user-select:none;margin-bottom:2px;}
    .chip:hover{background:var(--gray-100);}
    .chip.active{background:rgba(198,40,40,.1);color:var(--red);border-color:rgba(198,40,40,.2);}
    .chip-count{margin-left:auto;font-size:10px;color:var(--gray-400);font-weight:600;}
    .center{display:flex;flex-direction:column;overflow:hidden;}
    .center-top{padding:10px 18px;border-bottom:1px solid var(--gray-200);background:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .res-count{font-size:12px;color:var(--gray-500);}
    .sort-btn{font-size:11px;background:#fff;border:1px solid var(--gray-200);color:var(--gray-500);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;}
    .exam-grid{flex:1;overflow-y:auto;padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
    .exam-grid::-webkit-scrollbar{width:5px;}
    .exam-grid::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
    .ecard{background:#fff;border:1.5px solid var(--gray-200);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;position:relative;overflow:hidden;}
    .ecard:before{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
    .ecard:hover{border-color:var(--red);box-shadow:0 4px 14px rgba(198,40,40,.1);transform:translateY(-1px);}
    .ecard:hover:before{transform:scaleX(1);}
    .ec-name{font-size:13px;font-weight:700;color:var(--gray-800);margin-bottom:4px;line-height:1.3;}
    .ec-cat{font-size:10px;color:var(--gray-400);margin-bottom:6px;}
    .ec-desc{font-size:11px;color:var(--gray-500);line-height:1.4;margin-bottom:8px;flex:1;}
    .ec-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;border-top:1px solid var(--gray-100);padding-top:8px;margin-top:auto;}
    .ec-price{font-size:13px;font-weight:700;color:var(--red);}
    .ec-btns{display:flex;gap:4px;}
    .btn-add{padding:4px 10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-prep{padding:4px 8px;background:rgba(21,128,61,.12);color:var(--green);border:1px solid rgba(21,128,61,.25);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
    mark{background:rgba(198,40,40,.15);color:var(--red);border-radius:2px;}
    .budget{background:var(--gray-50);border-left:1px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden;}
    .budget-head{padding:12px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;}
    .budget-title{font-size:13px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;}
    .budget-cnt{background:var(--red);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .budget-clear{font-size:10px;background:none;border:1px solid var(--gray-200);color:var(--gray-500);cursor:pointer;padding:3px 8px;border-radius:5px;font-family:inherit;}
    .budget-list{flex:1;overflow-y:auto;padding:10px;}
    .budget-list::-webkit-scrollbar{width:4px;}
    .budget-list::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px;}
    .b-item{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:10px;margin-bottom:7px;display:flex;gap:8px;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .b-info{flex:1;min-width:0;}
    .b-name{font-size:12px;font-weight:700;color:var(--gray-800);word-wrap:break-word;margin-bottom:2px;}
    .b-sub{font-size:10px;color:var(--gray-400);}
    .b-price{font-size:12px;font-weight:700;color:var(--red);flex-shrink:0;}
    .b-remove{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;padding:0;line-height:1;flex-shrink:0;}
    .b-remove:hover{color:var(--red);}
    .budget-empty{text-align:center;padding:40px 14px;color:var(--gray-400);font-size:12px;}
    .budget-footer{border-top:1px solid var(--gray-200);padding:14px;background:#fff;}
    .tot-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-500);margin-bottom:4px;}
    .tot-main{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--gray-200);margin-bottom:12px;}
    .tot-label{font-size:14px;font-weight:700;}
    .tot-val{font-size:18px;font-weight:800;color:var(--red);}
    .act-btns{display:flex;gap:8px;}
    .act-btn{flex:1;padding:9px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;}
    .act-btn-p{background:var(--navy);color:#fff;}.act-btn-p:hover{background:#122b5e;}
    .act-btn-s{background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200);}.act-btn-s:hover{background:var(--gray-200);}
    .act-btn:disabled{opacity:.4;cursor:not-allowed;}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
    .overlay.open{display:flex;}
    .modal{background:#fff;border-radius:14px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);}
    .modal::-webkit-scrollbar{width:5px;}
    .modal::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:3px;}
    .modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:#fff;z-index:1;}
    .modal-cat-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:3px;}
    .modal-name{font-size:17px;font-weight:800;color:var(--navy);line-height:1.2;}
    .modal-close{background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-500);cursor:pointer;font-size:15px;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .modal-body{padding:18px 22px;}
    .info-box{background:var(--gray-50);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--gray-600);line-height:1.6;border-left:3px solid var(--gray-300);}
    .info-box.desc{border-left-color:var(--red);}
    .info-box.prep{border-left-color:var(--amber);}
    .info-box-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400);margin-bottom:5px;}
    .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .opt-card{background:var(--gray-50);border:2px solid var(--gray-200);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:border-color .15s;}
    .opt-card:hover,.opt-card.sel{border-color:var(--red);}
    .opt-label{font-size:12px;font-weight:600;margin-bottom:4px;}
    .opt-price{font-size:17px;font-weight:800;color:var(--red);}
    .opt-tag{font-size:10px;color:var(--gray-400);margin-top:2px;}
    .partner-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
    .pc{background:var(--gray-50);border:2px solid var(--gray-200);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;}
    .pc:hover,.pc.sel{border-color:var(--navy);}
    .pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .pc-name{font-size:13px;font-weight:700;color:var(--navy);}
    .pc-loc{font-size:10px;color:var(--gray-400);}
    .pc-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .pc-p{background:#fff;border:1px solid var(--gray-200);border-radius:6px;padding:6px 8px;text-align:center;}
    .pc-p-lbl{font-size:9px;color:var(--gray-400);margin-bottom:2px;text-transform:uppercase;}
    .pc-p-val{font-size:12px;font-weight:700;}
    .pc-p-val.clinic{color:var(--amber);}
    .pc-p-val.partner{color:var(--gray-500);}
    .pc-p-val.total{color:var(--red);}
    .modal-add-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
    .modal-add-btn:hover{background:var(--red-h);}
    .modal-add-btn:disabled{opacity:.4;cursor:not-allowed;}
    .prep-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
    .prep-overlay.open{display:flex;}
    .prep-modal{background:#fff;border-radius:14px;width:480px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4);}
    .prep-head{padding:14px 18px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff5f5;border-radius:14px 14px 0 0;}
    .prep-title{font-size:14px;font-weight:800;color:var(--red);display:flex;align-items:center;gap:7px;}
    .prep-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
    .prep-close{background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-500);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
    .prep-body{flex:1;overflow-y:auto;padding:18px;}
    .prep-body::-webkit-scrollbar{width:4px;}
    .prep-body::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px;}
    .prep-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .prep-sec-title::after{content:"";flex:1;height:1px;background:var(--gray-200);}
    .prep-item{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;background:var(--gray-50);border-radius:6px;margin-bottom:5px;font-size:12px;color:var(--gray-800);line-height:1.5;}
    .prep-item-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
    .prep-item.warn{background:rgba(180,83,9,.08);border-left:2px solid var(--amber);}
    .prep-item.info{background:rgba(10,31,68,.06);border-left:2px solid var(--navy);}
    .prep-foot{padding:12px 18px;border-top:1px solid var(--gray-200);flex-shrink:0;}
    .prep-copy-btn{width:100%;padding:9px;background:rgba(198,40,40,.1);color:var(--red);border:1px solid rgba(198,40,40,.2);border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
    .prep-copy-btn:hover,.prep-copy-btn.copied{background:var(--red);color:#fff;}
    .msg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
    .msg-overlay.open{display:flex;}
    .msg-modal{background:#fff;border-radius:14px;width:540px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4);}
    .msg-head{padding:14px 18px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .msg-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--navy);}
    .msg-close{background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-500);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
    .msg-body{flex:1;overflow-y:auto;padding:14px 18px;}
    .msg-ta{width:100%;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;color:var(--gray-800);font-family:"DM Mono",monospace,inherit;font-size:11.5px;line-height:1.6;padding:12px;resize:none;outline:none;min-height:220px;}
    .msg-foot{padding:12px 18px;border-top:1px solid var(--gray-200);display:flex;gap:8px;flex-shrink:0;}
    .msg-copy{flex:1;padding:10px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
    .msg-copy.copied{background:var(--red);}
    .msg-foot-close{padding:10px 16px;background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
    .partner-pills{display:flex;gap:6px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--gray-200);flex-shrink:0;display:none;}
    .partner-pills.show{display:flex;}
    .pp{font-size:11px;font-weight:600;background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-600);padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;}
    .pp.active{background:rgba(10,31,68,.1);color:var(--navy);border-color:rgba(10,31,68,.3);}
    .empty-g{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray-400);}
    .empty-g i{font-size:40px;display:block;margin-bottom:12px;opacity:.3;}
  </style>
</head>
<body>
<div class="red-bar"></div>
<header>
  <div class="logo">
    <div class="logo-img"><img src="assets/favicon.png" alt="Logo" id="headerLogo"></div>
    <div>
      <div class="logo-name">Amor Saúde</div>
      <div class="logo-sub">Orçamentos · Pirituba</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:12px;color:var(--gray-500);" id="examCountLabel">Carregando...</span>
    <button onclick="abrirMsg()" style="padding:5px 12px;background:var(--purple);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">📩 Mensagem WhatsApp</button>
    <button onclick="irPara('login.html')" style="padding:5px 12px;background:var(--red);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;"><i class="fas fa-home"></i> Portal</button>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="s-label">Buscar</div>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar exame...">
        <button id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="s-label">Categorias</div>
        <div id="catFilters"></div>
      </div>
      <div class="sidebar-section">
        <div class="s-label">Resumo</div>
        <div style="font-size:12px;color:var(--gray-600);display:flex;flex-direction:column;gap:4px;">
          <div style="display:flex;justify-content:space-between;"><span>Itens no orçamento</span><strong id="stat-items">0</strong></div>
          <div style="display:flex;justify-content:space-between;"><span>Total</span><strong style="color:var(--red);" id="stat-total">R$ 0,00</strong></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="center">
    <div class="center-top">
      <div class="res-count" id="resCount">Carregando...</div>
      <div style="display:flex;gap:6px;">
        <button class="sort-btn" onclick="toggleSort()" id="sortBtn">A–Z</button>
        <button class="sort-btn" onclick="exportarOrc()" style="color:var(--green);border-color:rgba(21,128,61,.3);">📊 Exportar</button>
      </div>
    </div>
    <div class="exam-grid" id="examGrid"></div>
  </main>

  <aside class="budget">
    <div class="budget-head">
      <div class="budget-title"><i class="fas fa-receipt"></i> Orçamento <div class="budget-cnt" id="bCount">0</div></div>
      <button class="budget-clear" onclick="clearBudget()">Limpar</button>
    </div>
    <div class="budget-list" id="budgetList"><div class="budget-empty">Nenhum exame adicionado</div></div>
    <div class="budget-footer">
      <div class="tot-main">
        <div class="tot-label">Total</div>
        <div class="tot-val" id="totalVal">R$ 0,00</div>
      </div>
      <div class="act-btns">
        <button class="act-btn act-btn-s" onclick="printBudget()" id="printBtn" disabled><i class="fas fa-print"></i> Imprimir</button>
        <button class="act-btn act-btn-p" onclick="copyBudget()" id="copyBtn" disabled><i class="fas fa-copy"></i> Copiar</button>
      </div>
    </div>
  </aside>
</div>

<!-- MODAL EXAME -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div><div class="modal-cat-tag" id="mCat"></div><div class="modal-name" id="mName"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<!-- PREP MODAL -->
<div class="prep-overlay" id="prepOverlay" onclick="if(event.target===this)closePrepModal()">
  <div class="prep-modal">
    <div class="prep-head">
      <div><div class="prep-title"><i class="fas fa-stethoscope"></i> Orientações de Preparo</div><div class="prep-sub" id="prepSub"></div></div>
      <button class="prep-close" onclick="closePrepModal()">✕</button>
    </div>
    <div class="prep-body" id="prepBody"></div>
    <div class="prep-foot"><button class="prep-copy-btn" id="prepCopyBtn" onclick="copyPrep()"><i class="fas fa-copy"></i> Copiar Preparo</button></div>
  </div>

// ── Estado ──
let allExams = [...EXAMS];
let currentCat = "all";
let currentSearch = "";
let sortAZ = true;
let budget = [];
let customPrices = {};
let selectedModal = { partner: null, option: null };

// ── Categorias únicas ──
const CATS = [...new Set(EXAMS.map(e => e.cat))];

function buildCatFilters() {
  const el = document.getElementById("catFilters");
  const counts = {};
  EXAMS.forEach(e => { counts[e.cat] = (counts[e.cat] || 0) + 1; });
  let html = `<div class="chip active" onclick="setCategory('all',this)"><i class="fas fa-th" style="font-size:10px;"></i> Todas <span class="chip-count">${EXAMS.length}</span></div>`;
  CATS.forEach(c => {
    const icons = {
      "Neurológico":"🧠","Cardiológico":"🫀","Ginecológico":"💃","Ortopédico":"🩼",
      "Otorrinolaringológico":"👃","Dermatológico":"🧬","Oftalmológico":"👁️",
      "Ultrassom":"🔊","Raio-X":"🦴","Tomografia":"💻","Ressonância":"🧲",
      "Gastrointestinal":"🩻","Laboratorial":"🧪","Outros":"➕"
    };
    html += `<div class="chip" onclick="setCategory('${c}',this)">${icons[c]||"•"} ${c.length>16?c.slice(0,14)+"…":c} <span class="chip-count">${counts[c]||0}</span></div>`;
  });
  el.innerHTML = html;
}

function setCategory(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderExams();
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  currentSearch = "";
  document.getElementById("clearBtn").classList.remove("visible");
  renderExams();
}

function toggleSort() {
  sortAZ = !sortAZ;
  document.getElementById("sortBtn").textContent = sortAZ ? "A–Z" : "Z–A";
  renderExams();
}

function highlight(text, query) {
  if (!query) return esc(text);
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return esc(text).replace(re, "<mark>$1</mark>");
}

function getPrice(exam) {
  return customPrices[exam.id] !== undefined ? customPrices[exam.id] : exam.price;
}

function fmt(v) {
  return "R$ " + Number(v || 0).toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function renderExams() {
  let list = allExams.filter(e => {
    const matchCat = currentCat === "all" || e.cat === currentCat;
    const matchQ = !currentSearch || e.name.toLowerCase().includes(currentSearch.toLowerCase()) || (e.desc||"").toLowerCase().includes(currentSearch.toLowerCase()) || e.cat.toLowerCase().includes(currentSearch.toLowerCase());
    return matchCat && matchQ;
  });
  if (sortAZ) list.sort((a, b) => a.name.localeCompare(b.name));
  else list.sort((a, b) => b.name.localeCompare(a.name));

  document.getElementById("resCount").textContent = list.length + " exame(s) encontrado(s)";
  document.getElementById("examCountLabel").textContent = allExams.length + " exames disponíveis";

  const g = document.getElementById("examGrid");
  if (!list.length) {
    g.innerHTML = '<div class="empty-g"><i class="fas fa-search"></i><div>Nenhum exame encontrado</div></div>';
    return;
  }
  g.innerHTML = list.map(e => {
    const price = getPrice(e);
    const hasPrep = !!e.prep && PREPS[e.prep];
    return `<div class="ecard" onclick="openModal('${e.id}')">
      <div class="ec-name">${highlight(e.name, currentSearch)}</div>
      <div class="ec-cat">${esc(e.cat)}</div>
      <div class="ec-desc">${esc(e.desc||"")}</div>
      <div class="ec-footer">
        <div class="ec-price">${fmt(price)}</div>
        <div class="ec-btns">
          ${hasPrep ? `<button class="btn-prep" onclick="event.stopPropagation();showPrep('${e.id}')">Preparo</button>` : ""}
          <button class="btn-add" onclick="event.stopPropagation();addToBudget('${e.id}')">+ Add</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── MODAL ──
function openModal(id) {
  const e = allExams.find(x => x.id === id);
  if (!e) return;
  selectedModal = { partner: null, option: null, examId: id };
  document.getElementById("mCat").textContent = e.cat;
  document.getElementById("mName").textContent = e.name;
  const price = getPrice(e);
  let body = "";
  if (e.desc) body += `<div class="info-box desc"><div class="info-box-lbl">Descrição</div>${esc(e.desc)}</div>`;
  if (e.prep && PREPS[e.prep]) {
    const p = PREPS[e.prep];
    const preview = p.secs[0]?.items[0]?.text || "";
    body += `<div class="info-box prep"><div class="info-box-lbl">Preparo</div>${esc(preview)}... <a href="#" onclick="event.preventDefault();showPrep('${e.id}')" style="color:var(--amber);font-weight:700;">Ver preparo completo</a></div>`;
  }
  body += `<div style="padding:14px;background:var(--gray-50);border-radius:10px;text-align:center;margin-bottom:14px;">
    <div style="font-size:11px;color:var(--gray-400);margin-bottom:4px;">Valor na Clínica</div>
    <div style="font-size:24px;font-weight:800;color:var(--red);">${fmt(price)}</div>
  </div>`;
  body += `<button class="modal-add-btn" onclick="addToBudget('${id}');closeModal()"><i class="fas fa-plus"></i> Adicionar ao Orçamento</button>`;
  document.getElementById("mBody").innerHTML = body;
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

// ── PREP ──
function showPrep(id) {
  const e = allExams.find(x => x.id === id);
  if (!e || !e.prep || !PREPS[e.prep]) { toast("Sem preparo específico para este exame", "info"); return; }
  const p = PREPS[e.prep];
  document.getElementById("prepSub").textContent = e.name;
  let html = "";
  p.secs.forEach(sec => {
    html += `<div style="margin-bottom:14px;"><div class="prep-sec-title">${esc(sec.title)}</div>`;
    sec.items.forEach(item => {
      html += `<div class="prep-item ${item.cls||""}"><div class="prep-item-icon">${item.icon||"•"}</div><div>${esc(item.text)}</div></div>`;
    });
    html += "</div>";
  });
  document.getElementById("prepBody").innerHTML = html;
  document.getElementById("prepCopyBtn").textContent = "📋 Copiar Preparo";
  document.getElementById("prepCopyBtn").classList.remove("copied");
  document.getElementById("prepOverlay").classList.add("open");
}

function closePrepModal() { document.getElementById("prepOverlay").classList.remove("open"); }
function closePrepOnBg(e) { if (e.target === document.getElementById("prepOverlay")) closePrepModal(); }

function copyPrep() {
  const prep = document.getElementById("prepBody").innerText;
  const sub = document.getElementById("prepSub").textContent;
  navigator.clipboard.writeText("*Orientações de Preparo — " + sub + "*\n\n" + prep).then(() => {
    const btn = document.getElementById("prepCopyBtn");
    btn.textContent = "✅ Copiado!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋 Copiar Preparo"; btn.classList.remove("copied"); }, 2500);
  });
}

// ── BUDGET ──
function addToBudget(id) {
  const e = allExams.find(x => x.id === id);
  if (!e) return;
  const price = getPrice(e);
  budget.push({ id: id + "_" + Date.now(), examId: id, name: e.name, cat: e.cat, price });
  renderBudget();
  toast(e.name.slice(0,30) + " adicionado!", "success");
}

function removeFromBudget(uid) {
  budget = budget.filter(b => b.id !== uid);
  renderBudget();
}

function clearBudget() {
  if (!budget.length) return;
  if (!confirm("Limpar orçamento?")) return;
  budget = []; renderBudget();
}

function renderBudget() {
  const el = document.getElementById("budgetList");
  document.getElementById("bCount").textContent = budget.length;
  if (!budget.length) {
    el.innerHTML = '<div class="budget-empty">Nenhum exame adicionado</div>';
    document.getElementById("totalVal").textContent = "R$ 0,00";
    document.getElementById("stat-items").textContent = "0";
    document.getElementById("stat-total").textContent = "R$ 0,00";
    document.getElementById("printBtn").disabled = true;
    document.getElementById("copyBtn").disabled = true;
    return;
  }
  const total = budget.reduce((s, b) => s + b.price, 0);
  el.innerHTML = budget.map(b =>
    `<div class="b-item">
      <div class="b-info">
        <div class="b-name">${esc(b.name)}</div>
        <div class="b-sub">${esc(b.cat)}</div>
      </div>
      <div class="b-price">${fmt(b.price)}</div>
      <button class="b-remove" onclick="removeFromBudget('${b.id}')">✕</button>
    </div>`
  ).join("");
  document.getElementById("totalVal").textContent = fmt(total);
  document.getElementById("stat-items").textContent = budget.length;
  document.getElementById("stat-total").textContent = fmt(total);
  document.getElementById("printBtn").disabled = false;
  document.getElementById("copyBtn").disabled = false;
}

function printBudget() {
  if (!budget.length) return;
  const win = window.open("", "_blank");
  if (!win) { alert("Permita pop-ups para imprimir."); return; }
  const total = budget.reduce((s, b) => s + b.price, 0);
  const data = new Date().toLocaleDateString("pt-BR");
  const logoUrl = sessionStorage.getItem("logoDataUrl") || "";
  const rows = budget.map(b => `<tr><td>${esc(b.name)}</td><td style="text-align:center">${esc(b.cat)}</td><td style="text-align:right;font-weight:700;color:#C62828;">${fmt(b.price)}</td></tr>`).join("");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Orçamento</title>
  <style>body{font-family:Arial,sans-serif;padding:2cm;color:#000;}h1{color:#0A1F44;margin-bottom:4px;}
  table{width:100%;border-collapse:collapse;margin-top:16px;}th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
  th{background:#0A1F44;color:#fff;}tr:nth-child(even)td{background:#f9f9f9;}
  .total-row td{font-size:15px;font-weight:700;background:#fff0f0;color:#C62828;}
  .footer{margin-top:24px;font-size:11px;color:#666;border-top:1px solid #ddd;padding-top:12px;}
  .logo{height:50px;object-fit:contain;margin-bottom:8px;}</style></head><body>
  ${logoUrl ? `<img src="${logoUrl}" class="logo">` : ""}
  <h1>Orçamento — Amor Saúde Pirituba</h1>
  <p style="color:#555;font-size:12px;">Data: ${data}</p>
  <table><thead><tr><th>Exame</th><th>Categoria</th><th>Valor</th></tr></thead>
  <tbody>${rows}<tr class="total-row"><td colspan="2"><b>TOTAL</b></td><td style="text-align:right">${fmt(total)}</td></tr></tbody></table>
  <div class="footer">Amor Saúde Pirituba · Valores sujeitos a alteração sem aviso prévio · ${data}</div>
  <script>window.print();<\/script></body></html>`);
  win.document.close();
}

function copyBudget() {
  if (!budget.length) return;
  const total = budget.reduce((s, b) => s + b.price, 0);
  const lines = budget.map(b => `• ${b.name}: ${fmt(b.price)}`).join("\n");
  const text = `🏥 *Orçamento — Amor Saúde Pirituba*\n\n${lines}\n\n💰 *Total: ${fmt(total)}*\n\n_Valores sujeitos a alteração. Agendamento: (11) XXXX-XXXX_`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.innerHTML = "✅ Copiado!";
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copiar'; }, 2500);
  });
}

function exportarOrc() {
  const data = allExams.map(e => ({ Exame: e.name, Categoria: e.cat, Descrição: e.desc || "", "Valor (R$)": getPrice(e) }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Exames");
  XLSX.writeFile(wb, "exames_amorsaude.xlsx");
}

// ── MSG ──
function abrirMsg() {
  if (!budget.length) { toast("Adicione exames ao orçamento primeiro", "info"); return; }
  gerarMsg(null);
  document.getElementById("partnerPills").classList.remove("show");
  document.getElementById("msgOverlay").classList.add("open");
}

function gerarMsg(parceiro) {
  const total = budget.reduce((s, b) => s + b.price, 0);
  const linhas = budget.map(b => `• ${b.name}: ${fmt(b.price)}`).join("\n");
  const intro = parceiro ? `🤝 Parceiro: ${parceiro}\n` : "";
  document.getElementById("msgText").value = `🏥 *Amor Saúde Pirituba*\n${intro}\n${linhas}\n\n💰 *Total estimado: ${fmt(total)}*\n\n_Valores para referência. Confirme disponibilidade pelo (11) XXXX-XXXX_`;
}

function closeMsgModal() { document.getElementById("msgOverlay").classList.remove("open"); }
function closeMsgOnBg(e) { if (e.target === document.getElementById("msgOverlay")) closeMsgModal(); }

function copyMsg() {
  navigator.clipboard.writeText(document.getElementById("msgText").value).then(() => {
    const btn = document.getElementById("msgCopyBtn");
    btn.innerHTML = "✅ Copiado!"; btn.classList.add("copied");
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copiar Mensagem'; btn.classList.remove("copied"); }, 2500);
  });
}

// ── SEARCH com debounce ──
const _renderDebounced = debounce(renderExams, 250);
const inp = document.getElementById("searchInput");
inp.addEventListener("input", e => {
  currentSearch = e.target.value.trim();
  document.getElementById("clearBtn").classList.toggle("visible", currentSearch.length > 0);
  _renderDebounced();
});

// ── INIT ──
buildCatFilters();
renderExams();
renderBudget();

</script>
<script type="module">
  import { initializeApp }                      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getDatabase, ref, get, onValue }     from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
  import { getAuth, onAuthStateChanged }        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

  const app  = initializeApp(window.FIREBASE_CONFIG);
  const db   = getDatabase(app);
  const auth = getAuth(app);
  window.initFirebaseUtils(db, ref, get);

  onAuthStateChanged(auth, user => {
    if (!user) return;
    carregarLogoGlobal(["#headerLogo"]);
    // Carrega preços customizados do Firebase
    onValue(ref(db, "admin/precos"), snap => {
      const d = snap.val();
      if (d) {
        Object.assign(window.customPrices, d);
        allExams = EXAMS.map(e => ({
          ...e,
          price: d[e.id] !== undefined ? d[e.id] : e.price,
          priceLabel: d[e.id] !== undefined ? fmt(d[e.id]) : e.priceLabel
        }));
        renderExams();
      }
    }, () => {});
  });
</script>
</body>
</html>
