<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Usuários — Amor Saúde</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="js/firebase-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;padding:32px 20px;}
    .card{background:white;border-radius:20px;box-shadow:0 4px 24px rgba(10,31,68,.10);max-width:700px;margin:0 auto;overflow:hidden;}
    .card-header{background:#0A1F44;padding:24px 28px;display:flex;align-items:center;gap:14px;}
    .card-header h1{font-size:18px;font-weight:800;color:white;line-height:1.2;}
    .card-header p{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;}
    .card-header i{font-size:28px;color:rgba(255,255,255,.4);}
    .card-body{padding:28px;}
    .warn{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:12px;color:#92400e;margin-bottom:22px;display:flex;gap:10px;align-items:flex-start;line-height:1.6;}
    .user-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
    .user-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:12px;background:#f8fafc;transition:border-color .2s;}
    .user-avatar{width:42px;height:42px;border-radius:10px;background:#0A1F44;color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:14px;font-weight:700;color:#1e293b;}
    .user-email{font-size:11px;color:#64748b;margin-top:2px;}
    .user-status{min-width:120px;text-align:right;}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .status-pending{background:#f1f5f9;color:#64748b;}
    .status-ok{background:#dcfce7;color:#15803d;}
    .status-exists{background:#fef3c7;color:#92400e;}
    .status-error{background:#fee2e2;color:#991b1b;}
    .status-loading{background:#dbeafe;color:#1d4ed8;}
    .perms-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
    .perm-chip{background:#ede9fe;color:#5b21b6;border-radius:5px;font-size:9px;font-weight:800;padding:2px 6px;}
    .actions{display:flex;gap:10px;justify-content:flex-end;padding-top:20px;border-top:1px solid #e2e8f0;}
    .btn-p{padding:10px 22px;background:#0A1F44;color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s;}
    .btn-p:hover{background:#122b5e;}
    .btn-p:disabled{opacity:.5;cursor:not-allowed;}
    .btn-sec{padding:10px 16px;background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-sec:hover{background:#e2e8f0;}
    #progressBar{height:4px;background:#dcfce7;border-radius:2px;overflow:hidden;margin-bottom:16px;display:none;}
    #progressFill{height:100%;background:#15803d;border-radius:2px;transition:width .4s;}
    .summary{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;font-size:13px;color:#15803d;display:none;margin-bottom:16px;}
    .summary strong{font-size:15px;display:block;margin-bottom:4px;}
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <i class="fas fa-users-gear"></i>
    <div>
      <h1>Criar Contas de Usuário</h1>
      <p>Utilitário único — cria logins e define permissões no Firebase</p>
    </div>
  </div>

  <div class="card-body">
    <div class="warn">
      <i class="fas fa-triangle-exclamation"></i>
      <div>
        <strong>Use esta página apenas uma vez.</strong><br>
        Ela cria os logins no Firebase Auth e salva as permissões no banco.
        Contas já existentes são ignoradas (sem sobrescrever dados).
        Senha padrão: <strong>Amor@100</strong>
      </div>
    </div>

    <div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
    <div class="summary" id="summary"></div>

    <div class="user-list" id="userList"></div>

    <div class="actions">
      <button class="btn-sec" onclick="irPara('login.html')"><i class="fas fa-arrow-left"></i> Voltar</button>
      <button class="btn-p" id="btnCriar" onclick="criarTodos()">
        <i class="fas fa-user-plus"></i> Criar todos os usuários
      </button>
    </div>
  </div>
</div>

<script>
  const USUARIOS = [
    { nomeCompleto: 'Kauany da Silva Dias',                    email: 'kauanyd@amorsaude.com'   },
    { nomeCompleto: 'Gustavo Brambila Acosta Chaves',          email: 'gustavob@amorsaude.com'  },
    { nomeCompleto: 'Tayna Sampaio Machado de Araújo',         email: 'taynas@amorsaude.com'    },
    { nomeCompleto: 'Carla Regina Vasques dos Santos',         email: 'carlar@amorsaude.com'    },
    { nomeCompleto: 'Fernanda Clara De Souza Sergio',          email: 'fernandac@amorsaude.com' },
    { nomeCompleto: 'Bruna Teixeira Rodrigues',                email: 'brunat@amorsaude.com'    },
    { nomeCompleto: 'Mariluce Ferreira de Lima Souza',         email: 'marilucef@amorsaude.com' },
  ];

  const PERMS = { orcamento: true, fechamento: true, exames: true, caixa: true };
  const PERMS_LABELS = ['Orçamentos', 'Fechamento', 'Retirada de Exames', 'Caixa'];
  const SENHA = 'Amor@100';

  // Inicializa lista visual
  function renderList() {
    const list = document.getElementById('userList');
    list.innerHTML = USUARIOS.map((u, i) => {
      const initials = u.nomeCompleto.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      return `<div class="user-item" id="item-${i}">
        <div class="user-avatar">${initials}</div>
        <div class="user-info">
          <div class="user-name">${u.nomeCompleto}</div>
          <div class="user-email">${u.email}</div>
          <div class="perms-row">${PERMS_LABELS.map(p=>`<span class="perm-chip">${p}</span>`).join('')}</div>
        </div>
        <div class="user-status">
          <span class="status-badge status-pending" id="status-${i}">
            <i class="fas fa-clock"></i> Aguardando
          </span>
        </div>
      </div>`;
    }).join('');
  }

  function setStatus(i, type, text, icon) {
    const el = document.getElementById('status-' + i);
    el.className = 'status-badge status-' + type;
    el.innerHTML = `<i class="fas fa-${icon}"></i> ${text}`;
  }

  renderList();

  window.criarTodos = async function() {
    const btn = document.getElementById('btnCriar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando...';

    const pb = document.getElementById('progressBar');
    const pf = document.getElementById('progressFill');
    pb.style.display = 'block';

    let criados = 0, jaExistiam = 0, erros = 0;

    for (let i = 0; i < USUARIOS.length; i++) {
      setStatus(i, 'loading', 'Criando...', 'spinner fa-spin');
      const u = USUARIOS[i];

      try {
        // Usar app secundário para não deslogar o admin
        const secondApp = window._createSecondaryApp
          ? window._createSecondaryApp()
          : null;

        if (!secondApp) {
          // Fallback: usar módulo inline
          setStatus(i, 'error', 'Módulo não carregado', 'times');
          erros++;
          continue;
        }

        const uid = await secondApp.createUser(u.email, SENHA);
        await secondApp.savePerms(uid, u.nomeCompleto, u.email, PERMS);
        await secondApp.deleteApp();
        setStatus(i, 'ok', 'Criado!', 'check');
        criados++;
      } catch(e) {
        if (e.code === 'auth/email-already-in-use') {
          setStatus(i, 'exists', 'Já existe', 'info-circle');
          jaExistiam++;
        } else {
          setStatus(i, 'error', 'Erro: ' + (e.code || e.message || 'desconhecido'), 'times');
          erros++;
        }
      }

      pf.style.width = Math.round((i+1)/USUARIOS.length*100) + '%';
    }

    // Resumo
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    sum.innerHTML = `<strong><i class="fas fa-check-circle"></i> Concluído!</strong>
      ${criados} conta(s) criada(s)
      ${jaExistiam ? ' · ' + jaExistiam + ' já existiam (mantidas)' : ''}
      ${erros ? ' · ' + erros + ' erro(s)' : ''}`;

    btn.innerHTML = '<i class="fas fa-check"></i> Processo concluído';
  };
</script>

<script type="module">
  import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
  import { getDatabase, ref, get, set }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

  const _app  = initializeApp(window.FIREBASE_CONFIG);
  const _auth = getAuth(_app);
  const _db   = getDatabase(_app);

  // Garante que só admin acessa esta página
  onAuthStateChanged(_auth, async user => {
    if (!user) { irPara('login.html'); return; }
    try {
      const snap = await get(ref(_db, 'admin/usuarios/' + user.uid));
      const perms = (snap.val() || {}).perms || {};
      if (!perms.admin && user.email !== 'raphael@amorsaude.com') {
        irPara('login.html'); return;
      }
    } catch(e) {
      if (user.email !== 'raphael@amorsaude.com') { irPara('login.html'); return; }
    }
  });

  // Expõe função para criar usuário via app secundário
  window._createSecondaryApp = function() {
    const secondApp  = initializeApp(window.FIREBASE_CONFIG, 'creator_' + Date.now());
    const secondAuth = getAuth(secondApp);
    const secondDb   = getDatabase(secondApp);

    return {
      createUser: async (email, senha) => {
        const cred = await createUserWithEmailAndPassword(secondAuth, email, senha);
        return cred.user.uid;
      },
      savePerms: async (uid, nomeCompleto, email, perms) => {
        await set(ref(secondDb, 'admin/usuarios/' + uid), {
          nomeCompleto,
          email,
          perms
        });
      },
      deleteApp: () => deleteApp(secondApp)
    };
  };
</script>

</body>
</html>
