<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro — Amor Saúde Pirituba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/firebase-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <style>
    :root{--navy:#0A1F44;--navy-mid:#122b5e;--red:#C62828;--red-h:#ad1f1f;--white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-800:#1e293b;--green:#15803d;--green-bg:rgba(21,128,61,.1);--shadow:0 4px 20px rgba(10,31,68,.1);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;color:var(--gray-800);min-height:100vh;}
    .red-bar{height:3px;background:var(--red);position:fixed;top:0;left:0;right:0;z-index:100;}
    .s-header{background:white;border-bottom:2px solid var(--gray-200);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:3px;z-index:50;}
    .s-logo{display:flex;align-items:center;gap:12px;}
    .s-logo-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .s-logo-icon img{width:100%;height:100%;object-fit:contain;}
    .s-logo-name{font-size:16px;font-weight:800;color:var(--navy);letter-spacing:-.3px;}
    .s-logo-sub{font-size:10px;font-weight:500;color:var(--gray-400);}
    .s-header-right{display:flex;align-items:center;gap:10px;}
    .s-badge{background:#fff0f0;color:var(--red);border:1px solid rgba(198,40,40,.2);border-radius:20px;font-size:11px;font-weight:700;padding:4px 12px;display:flex;align-items:center;gap:5px;}
    .back-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
    .back-btn:hover{background:var(--red-h);}
    .content{max-width:1000px;margin:0 auto;padding:28px 24px 60px;}
    .panel{background:white;border:1px solid var(--gray-200);border-radius:18px;padding:28px;margin-bottom:20px;box-shadow:var(--shadow);}
    .panel-title{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:22px;display:flex;align-items:center;gap:9px;padding-bottom:14px;border-bottom:1px solid var(--gray-100);}
    .panel-title i{color:var(--red);font-size:15px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-group{display:flex;flex-direction:column;gap:7px;}
    .form-label{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gray-500);}
    .f-input,.f-select{padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .2s,box-shadow .2s;}
    .f-input:focus,.f-select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,31,68,.08);background:white;}
    .f-select{appearance:none;-webkit-appearance:none;cursor:pointer;}
    .date-row{display:flex;gap:8px;}
    .date-row .f-input{flex:1;}
    .busca-wrap{position:relative;}
    .busca-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:13px;pointer-events:none;}
    .busca-wrap .f-input{padding-left:36px;}
    .sel-todos{display:flex;align-items:center;gap:10px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 14px;cursor:pointer;transition:border-color .2s;}
    .sel-todos:hover{border-color:var(--navy);}
    .sel-todos input[type="checkbox"]{width:16px;height:16px;accent-color:var(--navy);cursor:pointer;}
    .sel-todos label{font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;margin:0;}
    .colab-list{border:1.5px solid var(--gray-200);border-radius:12px;background:white;max-height:340px;overflow-y:auto;margin:14px 0;}
    .colab-list::-webkit-scrollbar{width:5px;}
    .colab-list::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
    .colab-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--gray-100);transition:background .12s;cursor:pointer;}
    .colab-item:last-child{border-bottom:none;}
    .colab-item:hover{background:var(--gray-50);}
    .colab-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--navy);cursor:pointer;flex-shrink:0;}
    .colab-item label{font-size:13px;color:var(--gray-700);cursor:pointer;margin:0;line-height:1.3;}
    .colab-item label span{font-size:11px;color:var(--gray-400);display:block;}
    .sel-count{font-size:12px;color:var(--gray-500);display:flex;align-items:center;gap:6px;margin-top:8px;}
    .sel-count strong{color:var(--navy);}
    .action-btns{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;}
    .btn-gerar{padding:12px 24px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(10,31,68,.25);transition:background .2s,transform .15s;}
    .btn-gerar:hover{background:var(--navy-mid);transform:translateY(-1px);}
    .btn-limpar{padding:12px 20px;background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;}
    .btn-limpar:hover{background:var(--gray-200);color:var(--gray-800);}
    .toast-box{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
    .toast{padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;color:white;box-shadow:0 4px 14px rgba(0,0,0,.2);animation:slideIn .3s ease;max-width:320px;}
    @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    .toast.success{background:#15803d;}.toast.error{background:var(--red);}.toast.info{background:var(--navy);}
    .crud-overlay{display:none;position:fixed;inset:0;background:rgba(10,31,68,.55);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;}
    .crud-overlay.open{display:flex;}
    .crud-modal{background:white;border-radius:18px;width:100%;max-width:820px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden;}
    .crud-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .crud-header h3{font-size:16px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;}
    .crud-close{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);font-size:14px;transition:all .15s;}
    .crud-close:hover{background:var(--gray-200);}
    .crud-body{flex:1;overflow-y:auto;padding:20px 24px;}
    .crud-tabs{display:flex;gap:6px;margin-bottom:20px;}
    .crud-tab{padding:8px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-500);transition:all .18s;display:flex;align-items:center;gap:7px;}
    .crud-tab.active{background:var(--navy);color:white;border-color:var(--navy);}
    .tab-pane{display:none;}.tab-pane.active{display:block;}
    .form-field{margin-bottom:16px;}
    .form-field label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gray-500);margin-bottom:7px;}
    .form-field input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .2s,box-shadow .2s;}
    .form-field input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,31,68,.08);background:white;}
    .form-field input.err{border-color:var(--red);}
    .btn-salvar{padding:11px 22px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .2s,transform .15s;box-shadow:0 4px 14px rgba(10,31,68,.22);}
    .btn-salvar:hover{background:var(--navy-mid);transform:translateY(-1px);}
    .manage-list{border:1.5px solid var(--gray-200);border-radius:12px;overflow:hidden;background:white;}
    .manage-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--gray-100);gap:12px;transition:background .12s;}
    .manage-item:last-child{border-bottom:none;}
    .manage-item:hover{background:var(--gray-50);}
    .manage-item-info{flex:1;min-width:0;}
    .manage-item-nome{font-size:13px;font-weight:600;color:var(--gray-800);}
    .manage-item-cpf{font-size:11px;color:var(--gray-400);margin-top:1px;}
    .manage-item-source{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:10px;}
    .manage-item-source.fixed{background:#e0f2fe;color:#0369a1;}
    .manage-item-source.custom{background:#dcfce7;color:#166534;}
    .btn-edit-item{background:rgba(10,31,68,.08);border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--navy);font-size:12px;transition:all .15s;flex-shrink:0;}
    .btn-edit-item:hover{background:var(--navy);color:white;}
    .btn-del-item{background:rgba(198,40,40,.08);border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--red);font-size:12px;transition:all .15s;flex-shrink:0;}
    .btn-del-item:hover{background:var(--red);color:white;}
    .manage-search-wrap{position:relative;margin-bottom:14px;}
    .manage-search-wrap .f-input{padding-left:36px;}
    .del-confirm{display:none;align-items:center;gap:10px;background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;}
    .del-confirm.show{display:flex;}
    .del-confirm span{flex:1;color:var(--red);font-weight:500;}
    .btn-del-confirm{padding:6px 14px;background:var(--red);color:white;border:none;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-del-cancel{padding:6px 14px;background:var(--gray-200);color:var(--gray-700);border:none;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
    @media(max-width:700px){.form-row,.form-row-3{grid-template-columns:1fr;}.content{padding:16px 14px 60px;}}
    @media print{.red-bar,#sistema .s-header,.content .panel,.toast-box,.back-btn{display:none!important;}body{background:white;}.recibo-print{border:2px solid #000;padding:.7cm;margin-bottom:.8cm;page-break-inside:avoid;font-family:Arial,sans-serif;background:white;color:black;}.recibo-print .titulo{font-size:18px;font-weight:bold;text-align:center;margin-bottom:10px;}.recibo-print .empresa{font-size:12px;font-weight:bold;display:flex;justify-content:space-between;margin-bottom:12px;}.recibo-print .empregado{font-size:12px;font-weight:bold;margin-bottom:12px;}.recibo-print .texto{font-size:12px;line-height:1.5;margin-bottom:15px;}.recibo-print .data-local{text-align:center;font-size:12px;margin-bottom:15px;}.recibo-print .assinatura{text-align:center;margin-top:5px;}.recibo-print .linha-assinatura{width:70%;margin:0 auto 4px;border-top:1px solid #000;}.recibo-print .nome-assinatura{font-size:11px;text-transform:uppercase;}}
  </style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="toast-box" id="toastBox"></div>

  <div id="sistema">
    <div class="s-header">
      <div class="s-logo">
        <div class="s-logo-icon"><img src="assets/favicon.png" alt="Logo" id="headerLogo"></div>
        <div>
          <div class="s-logo-name">Amor Saúde</div>
          <div class="s-logo-sub">Financeiro · Pirituba</div>
        </div>
      </div>
      <div class="s-header-right">
        <div class="s-badge"><i class="fas fa-shield-halved"></i> Acesso Restrito</div>
        <button class="back-btn" onclick="irPara('login.html')"><i class="fas fa-home"></i> Portal</button>
      </div>
    </div>

    <div class="content">
      <div class="panel">
        <div class="panel-title" style="justify-content:space-between;">
          <span><i class="fas fa-users"></i> Colaboradores</span>
          <button onclick="abrirCrud()" style="padding:7px 16px;background:var(--navy);color:white;border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;"><i class="fas fa-user-gear"></i> Gerenciar</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Buscar colaborador</label>
            <div class="busca-wrap">
              <i class="fas fa-search busca-icon"></i>
              <input class="f-input" type="text" id="buscaColab" placeholder="Nome ou CPF..." oninput="filtrarColab()">
            </div>
          </div>
          <div class="form-group" style="justify-content:flex-end;">
            <label class="form-label">Seleção rápida</label>
            <div class="sel-todos" onclick="document.getElementById('chkTodos').click()">
              <input type="checkbox" id="chkTodos" onchange="toggleTodos()">
              <label for="chkTodos">Marcar / Desmarcar todos</label>
            </div>
          </div>
        </div>
        <div class="colab-list" id="colabList"></div>
        <div class="sel-count" id="selCount"><strong id="selNum">0</strong> colaborador(es) selecionado(s)</div>
      </div>

      <div class="panel">
        <div class="panel-title"><i class="fas fa-file-invoice-dollar"></i> Dados do Recibo</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Categoria *</label>
            <select class="f-select" id="categoria">
              <option value="">Selecione...</option>
              <option value="Bonificação">Bonificação</option>
              <option value="Vale-Transporte">Vale-Transporte</option>
              <option value="Salário">Salário</option>
              <option value="Adiantamento">Adiantamento</option>
              <option value="Cesta Básica">Cesta Básica</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Forma de pagamento</label>
            <select class="f-select" id="formaPag">
              <option value="pix">PIX</option>
              <option value="dinheiro">Dinheiro</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Período (opcional)</label>
            <div class="date-row">
              <input class="f-input" type="date" id="dtInicio">
              <input class="f-input" type="date" id="dtFim">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Valor (R$) *</label>
            <input class="f-input" type="text" id="valor" placeholder="0,00" oninput="mascaraMoeda(this)">
          </div>
        </div>
        <div class="action-btns">
          <button class="btn-gerar" onclick="gerarRecibos()"><i class="fas fa-print"></i> Gerar Recibos</button>
          <button class="btn-limpar" onclick="limpar()"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
      </div>
    </div>

    <div class="crud-overlay" id="crudOverlay" onclick="fecharCrudBg(event)">
      <div class="crud-modal">
        <div class="crud-header">
          <h3><i class="fas fa-user-gear" style="color:var(--red)"></i> Gerenciar Colaboradores</h3>
          <button class="crud-close" onclick="fecharCrud()"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="crud-body">
          <div class="crud-tabs">
            <button class="crud-tab active" id="tabCriar"   onclick="mudarTab('criar')"><i class="fas fa-user-plus"></i> Criar</button>
            <button class="crud-tab"        id="tabEditar"  onclick="mudarTab('editar')"><i class="fas fa-pen"></i> Editar</button>
            <button class="crud-tab"        id="tabExcluir" onclick="mudarTab('excluir')"><i class="fas fa-user-minus"></i> Excluir</button>
          </div>
          <div class="tab-pane active" id="paneCriar">
            <div class="form-field"><label>Nome completo *</label><input type="text" id="novoNome" placeholder="Ex: JOÃO SILVA SANTOS" oninput="this.value=this.value.toUpperCase()"></div>
            <div class="form-field"><label>CPF * (somente números)</label><input type="text" id="novoCpf" placeholder="00000000000" maxlength="11" oninput="this.value=this.value.replace(/\D/g,'').slice(0,11)"></div>
            <button class="btn-salvar" onclick="criarColab()"><i class="fas fa-check"></i> Cadastrar Colaborador</button>
          </div>
          <div class="tab-pane" id="paneEditar">
            <div class="manage-search-wrap">
              <i class="fas fa-search busca-icon"></i>
              <input class="f-input" type="text" id="buscaEditar" placeholder="Buscar colaborador..." oninput="renderManage('editar')">
            </div>
            <div class="manage-list" id="listaEditar"></div>
            <div id="formEditar" style="display:none;margin-top:18px;padding:18px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:12px;">
              <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;"><i class="fas fa-pen"></i> Editando colaborador</div>
              <input type="hidden" id="editCpfOriginal">
              <div class="form-field"><label>Nome completo *</label><input type="text" id="editNome" oninput="this.value=this.value.toUpperCase()"></div>
              <div class="form-field"><label>CPF * (somente números)</label><input type="text" id="editCpf" maxlength="11" oninput="this.value=this.value.replace(/\D/g,'').slice(0,11)"></div>
              <div style="display:flex;gap:10px;margin-top:4px;">
                <button class="btn-salvar" onclick="salvarEdicao()"><i class="fas fa-check"></i> Salvar</button>
                <button onclick="cancelarEdicao()" style="padding:11px 18px;background:var(--gray-200);color:var(--gray-700);border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">Cancelar</button>
              </div>
            </div>
          </div>
          <div class="tab-pane" id="paneExcluir">
            <div class="del-confirm" id="delConfirm">
              <span id="delConfirmMsg"></span>
              <button class="btn-del-confirm" onclick="confirmarExclusao()">Excluir</button>
              <button class="btn-del-cancel" onclick="cancelarExclusao()">Cancelar</button>
            </div>
            <div class="manage-search-wrap">
              <i class="fas fa-search busca-icon"></i>
              <input class="f-input" type="text" id="buscaExcluir" placeholder="Buscar colaborador..." oninput="renderManage('excluir')">
            </div>
            <div class="manage-list" id="listaExcluir"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    const app = initializeApp(window.FIREBASE_CONFIG);
    const db  = getDatabase(app);

    /* Verificação de sessão */
    if (!sessionStorage.getItem('uid')) { irPara('login.html'); }

    /* Carrega logo dinamicamente */
    carregarLogoGlobal(['#headerLogo']);

    /* ── Estado Firebase ── */
    window.extrasDB  = [];
    window.deletedDB = [];
    window.colaboradores = [];

    onValue(ref(db, 'financeiro/colaboradores_extras'), snap => {
      window.extrasDB = snap.val() || [];
      atualizarListaGeral();
    });

    onValue(ref(db, 'financeiro/colaboradores_apagados'), snap => {
      window.deletedDB = snap.val() || [];
      atualizarListaGeral();
    });

    window.saveExtras  = async arr => set(ref(db, 'financeiro/colaboradores_extras'), arr);
    window.saveDeleted = async arr => set(ref(db, 'financeiro/colaboradores_apagados'), arr);

    function atualizarListaGeral() {
      const overridden = window.extrasDB.filter(e => e.overrideCpf).map(e => e.overrideCpf);
      const base = window.colabBase
        .filter(b => !window.deletedDB.includes(b.cpfRaw) && !overridden.includes(b.cpfRaw))
        .map(b => ({ ...b, source: 'fixed' }));
      const extraList = window.extrasDB.map(e => ({
        nome: e.nome, cpfRaw: e.cpf, cpf: formatCPF(e.cpf), source: e.overrideCpf ? 'edited' : 'custom'
      }));
      window.colaboradores = [...base, ...extraList].sort((a, b) => a.nome.localeCompare(b.nome));
      if (document.getElementById('colabList')) {
        window.renderColab(window.colaboradores);
        window.atualizarContador();
      }
    }
  </script>

  <script>
    /* ── Base de colaboradores
     * ATENÇÃO: dados sensíveis. Migrar para Firebase DB com regras
     * de leitura autenticada (auth != null) em uma próxima versão.
     */
    const colaboradoresRaw = [
      {nome:"ALEXSANDRA DE CASSIA NUNES",cpf:"32125692805"},{nome:"ALICE VITORIA DIAS",cpf:"54323124848"},
      {nome:"BRUNA TEIXEIRA RODRIGUES",cpf:"57876434886"},{nome:"CARLA REGINA VASQUES DO SANTOS",cpf:"25271255816"},
      {nome:"CAROLINA PIRES PARRA",cpf:"53882892811"},{nome:"CAROLINE PAOLA DA FONSECA",cpf:"47520435806"},
      {nome:"EMILY ESHE DOS SANTOS DA SILVA",cpf:"54299480805"},{nome:"FELIPE AZEVEDO BARBOSA",cpf:"39956608866"},
      {nome:"FERNANDA CLARA DE SOUZA SERGIO",cpf:"28834797809"},{nome:"GABRIEL OLIVEIRA BATISTA",cpf:"45100790873"},
      {nome:"GIOVANNA PEREIRA ALBUQUERQUE",cpf:"50266236898"},{nome:"GUSTAVO BRAMBILA ACOSTA CHAVES",cpf:"43041882833"},
      {nome:"JESSICA DA CRUZ CARVALHO",cpf:"22855216850"},{nome:"JOAO VICTOR SOUSA",cpf:"50349917809"},
      {nome:"JONATHAN SILVA OLIVEIRA",cpf:"47949073896"},{nome:"KAUANNY DA ROSA MARTINS",cpf:"54630232800"},
      {nome:"KAUANY DA SILVA DIAS",cpf:"48319531802"},{nome:"KAUANY NUNES MARTINS",cpf:"51521221898"},
      {nome:"KELLI CRISTINA COSTA MENDES",cpf:"25824507821"},{nome:"LETICIA DE SOUZA NOLASCO",cpf:"50904875881"},
      {nome:"LORENA PINHOTI DA COSTA",cpf:"41547345802"},{nome:"LUIZA REBECA RIBEIRO DE OLIVEIRA",cpf:"54269030852"},
      {nome:"MARIANA SANTOS DA ANUNCIAÇÃO",cpf:"51757278850"},{nome:"MARLENE RODRIGUES DOS SANTOS",cpf:"33602349870"},
      {nome:"NATIELY PALMITOS DOS SANTOS GOMES",cpf:"35423570816"},{nome:"PAMELA DA SILVA URIAS",cpf:"46813138820"},
      {nome:"RAPHAEL MORAIS DA SILVA",cpf:"52465168819"},{nome:"TAINA SABINO ROCHA",cpf:"51771453877"},
      {nome:"TATIANE TEDESCO BERLAMINO",cpf:"34914656809"},{nome:"TAYNA SAMPAIO MACHADO DE ARAUJO",cpf:"48693791800"},
      {nome:"VINICIUS RODRIGO DA SILVA OLIVEIRA",cpf:"36675394878"},{nome:"VIVIANE LUCIENE RODRIGUES NEVES",cpf:"08989207444"},
      {nome:"YANE RILMARA SALVADOR",cpf:"12488636401"}
    ];

    window.colabBase = colaboradoresRaw.map(c => ({
      nome: c.nome, cpfRaw: c.cpf, cpf: formatCPF(c.cpf), source: 'fixed'
    }));

    window.renderColab = function(lista) {
      const el = document.getElementById('colabList');
      if (!lista.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px;">Nenhum colaborador encontrado</div>'; return; }
      el.innerHTML = lista.map(c => `
        <div class="colab-item" id="ci_${c.cpfRaw}" onclick="selecionarColab(this,'${c.cpfRaw}')">
          <input type="checkbox" class="colab-chk" value="${c.cpfRaw}" data-nome="${esc(c.nome)}" onchange="atualizarContador()" onclick="event.stopPropagation()">
          <label onclick="event.preventDefault()">${esc(c.nome)}<span>${esc(c.cpf)}</span></label>
          <div class="colab-actions" id="ca_${c.cpfRaw}" style="display:none;gap:6px;margin-left:auto;align-items:center;">
            <button onclick="event.stopPropagation();iniciarEdicaoRapida('${c.cpfRaw}')" style="padding:5px 10px;background:var(--navy);color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;"><i class="fas fa-pen"></i> Editar</button>
            <button onclick="event.stopPropagation();pedirExclusaoRapida('${c.cpfRaw}')" style="padding:5px 10px;background:var(--red);color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;"><i class="fas fa-trash"></i> Excluir</button>
          </div>
        </div>`).join('');
    };

    let colabSelecionado = null;

    window.selecionarColab = function(el, cpf) {
      const chk = el.querySelector('.colab-chk');
      if (chk) { chk.checked = !chk.checked; atualizarContador(); }
      if (colabSelecionado && colabSelecionado !== cpf) {
        const prev = document.getElementById('ca_' + colabSelecionado);
        const prevI = document.getElementById('ci_' + colabSelecionado);
        if (prev)  prev.style.display = 'none';
        if (prevI) prevI.style.background = '';
      }
      const actions = document.getElementById('ca_' + cpf);
      const isOpen  = actions && actions.style.display !== 'none';
      if (actions) actions.style.display = isOpen ? 'none' : 'flex';
      el.style.background = isOpen ? '' : 'var(--gray-50)';
      colabSelecionado = isOpen ? null : cpf;
    };

    window.iniciarEdicaoRapida = function(cpf) {
      const colab = window.colaboradores.find(c => c.cpfRaw === cpf);
      if (!colab) return;
      abrirCrud();
      setTimeout(() => {
        mudarTab('editar');
        const busca = document.getElementById('buscaEditar');
        if (busca) { busca.value = colab.nome; renderManage('editar'); }
        setTimeout(() => iniciarEdicao(cpf), 150);
      }, 60);
    };

    window.pedirExclusaoRapida = function(cpf) {
      const colab = window.colaboradores.find(c => c.cpfRaw === cpf);
      const nome  = colab ? colab.nome : cpf;
      if (!confirm('Excluir ' + nome + '?\nEsta ação não pode ser desfeita.')) return;
      const isBase = window.colabBase.find(b => b.cpfRaw === cpf);
      if (isBase) window.saveDeleted([...window.deletedDB, cpf]);
      else         window.saveExtras(window.extrasDB.filter(c => c.cpf !== cpf));
      colabSelecionado = null;
      toast('Colaborador removido.', 'info');
    };

    window.filtrarColab = function() {
      const t = document.getElementById('buscaColab').value.toLowerCase();
      if (!t) { renderColab(window.colaboradores); return; }
      const f = window.colaboradores.filter(c => c.nome.toLowerCase().includes(t) || c.cpfRaw.includes(t));
      renderColab(f);
    };

    window.toggleTodos = function() {
      const sel = document.getElementById('chkTodos').checked;
      document.querySelectorAll('.colab-chk').forEach(cb => cb.checked = sel);
      atualizarContador();
    };

    window.atualizarContador = function() {
      document.getElementById('selNum').textContent = document.querySelectorAll('.colab-chk:checked').length;
    };

    /* ── Gerar recibos ── */
    window.gerarRecibos = function() {
      const checks = document.querySelectorAll('.colab-chk:checked');
      if (!checks.length) { toast('Selecione pelo menos um colaborador', 'error'); return; }
      const cat = document.getElementById('categoria').value;
      const val = parseFloat((document.getElementById('valor').value || '0').replace(/\./g,'').replace(',','.')) || 0;
      const inicio = document.getElementById('dtInicio').value;
      const fim    = document.getElementById('dtFim').value;
      if (!cat) { toast('Selecione a categoria do recibo', 'error'); return; }
      if (val <= 0) { toast('Informe um valor válido', 'error'); return; }

      const selecionados = [...checks].map(cb => ({ nome: cb.dataset.nome, cpfRaw: cb.value, cpf: formatCPF(cb.value) }));

      /* FIX: verificar se popup foi bloqueado */
      const win = window.open('', '_blank');
      if (!win) { toast('Permita pop-ups no navegador para imprimir', 'error'); return; }

      let recibosHTML = '';
      selecionados.forEach((col, i) => {
        recibosHTML += buildRecibo(col, cat, val, inicio, fim);
        if ((i + 1) % 4 === 0 && i + 1 < selecionados.length)
          recibosHTML += '<div style="page-break-after:always;"></div>';
      });

      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Recibos</title><style>@page{size:A4;margin:.8cm}body{font-family:Arial,sans-serif;background:white;margin:0;padding:0;}.recibo-print{border:2px solid #000;padding:.6cm;margin-bottom:.7cm;page-break-inside:avoid;}.recibo-print .titulo{font-size:18px;font-weight:bold;text-align:center;margin-bottom:10px;}.recibo-print .empresa{font-size:12px;font-weight:bold;display:flex;justify-content:space-between;margin-bottom:12px;}.recibo-print .empregado{font-size:12px;font-weight:bold;margin-bottom:12px;}.recibo-print .texto{font-size:12px;line-height:1.5;margin-bottom:15px;}.recibo-print .data-local{text-align:center;font-size:12px;margin-bottom:15px;}.recibo-print .assinatura{text-align:center;margin-top:5px;}.recibo-print .linha-assinatura{width:70%;margin:0 auto 4px;border-top:1px solid #000;}.recibo-print .nome-assinatura{font-size:11px;text-transform:uppercase;}</style></head><body>${recibosHTML}</body></html>`);
      win.document.close();
      win.print();
      toast(`${selecionados.length} recibo(s) gerado(s)!`, 'success');
    };

    function buildRecibo(col, categoria, valor, inicio, fim) {
      const valorF  = fmtMoeda(valor);
      const extenso = valorExtenso(valor);
      const catLow  = categoria.toLowerCase();
      let periodo   = '';
      if (inicio && fim) {
        const di = inicio.split('-').reverse().join('/');
        const df = fim.split('-').reverse().join('/');
        periodo = ` para utilização no período de <strong>${di} a ${df}</strong>`;
      }
      const titulo = categoria === 'Vale-Transporte' ? 'Recibo de entrega de vale-transporte' : `Recibo de ${categoria}`;
      const logoLocal = sessionStorage.getItem('logoDataUrl') || '';
      return `<div class="recibo-print">
        <div class="titulo">${titulo}</div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
          ${logoLocal ? `<img src="${logoLocal}" style="height:50px;width:auto;max-width:140px;object-fit:contain;" alt="Logo">` : '<span style="font-size:14px;font-weight:900;color:#000;">Amor Saúde</span>'}
        </div>
        <div class="empresa"><span>SIM CLÍNICA MÉDICA E ODONTOLÓGICA LTDA</span><span>CNPJ: 25.154.224/0001-89</span></div>
        <div class="empregado">Nome do Empregado: ${esc(col.nome)} - CPF ${esc(col.cpf)}</div>
        <div class="texto">Recebi da empresa Sim Clínica Médica e Odontológica LTDA, o equivalente a <strong>R$ ${valorF} ( ${extenso} )</strong> de ${catLow}${periodo}.</div>
        <div class="data-local">São Paulo, ____/_____/_____.</div>
        <div class="assinatura"><div class="linha-assinatura"></div><div class="nome-assinatura">${esc(col.nome)}</div></div>
      </div>`;
    }

    window.limpar = function() {
      document.getElementById('buscaColab').value  = '';
      document.getElementById('categoria').value   = '';
      document.getElementById('formaPag').value    = 'pix';
      document.getElementById('dtInicio').value    = '';
      document.getElementById('dtFim').value       = '';
      document.getElementById('valor').value       = '';
      document.getElementById('chkTodos').checked  = false;
      renderColab(window.colaboradores);
      atualizarContador();
      toast('Formulário limpo', 'info');
    };

    function valorExtenso(valor) {
      if (valor === 0) return 'zero reais';
      const uni=['','um','dois','três','quatro','cinco','seis','sete','oito','nove'];
      const dez=['','dez','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
      const esp=['dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
      const cen=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
      let inteiro = Math.floor(valor), centavos = Math.round((valor - inteiro) * 100);
      function conv(n){if(n===0)return'';if(n===100)return'cem';if(n>=1000){let m=Math.floor(n/1000),r=n%1000;return(m===1?'mil':conv(m)+' mil')+(r>0?' e '+conv(r):'');}let c=Math.floor(n/100),d=Math.floor((n%100)/10),u=n%10,s='';if(c)s+=cen[c];if(c&&(d||u))s+=' e ';if(d===1)s+=esp[u];else{if(d)s+=dez[d];if(d&&u)s+=' e ';if(u)s+=uni[u];}return s;}
      let ext=conv(inteiro)+(inteiro===1?' real':' reais');
      if(centavos>0)ext+=' e '+conv(centavos)+(centavos===1?' centavo':' centavos');
      return ext;
    }

    /* ── CRUD ── */
    window.abrirCrud = function() { document.getElementById('crudOverlay').classList.add('open'); mudarTab('criar'); };
    window.fecharCrud = function() { document.getElementById('crudOverlay').classList.remove('open'); cancelarEdicao(); cancelarExclusao(); };
    window.fecharCrudBg = function(e) { if (e.target === document.getElementById('crudOverlay')) fecharCrud(); };

    window.mudarTab = function(tab) {
      ['criar','editar','excluir'].forEach(t => {
        const T = t.charAt(0).toUpperCase() + t.slice(1);
        document.getElementById('tab' + T).classList.remove('active');
        document.getElementById('pane'+ T).classList.remove('active');
      });
      const T = tab.charAt(0).toUpperCase() + tab.slice(1);
      document.getElementById('tab' + T).classList.add('active');
      document.getElementById('pane'+ T).classList.add('active');
      if (tab === 'editar')  renderManage('editar');
      if (tab === 'excluir') renderManage('excluir');
    };

    window.criarColab = function() {
      const nome = document.getElementById('novoNome').value.trim().toUpperCase();
      const cpf  = document.getElementById('novoCpf').value.trim().replace(/\D/g,'');
      document.getElementById('novoNome').classList.remove('err');
      document.getElementById('novoCpf').classList.remove('err');
      if (!nome) { document.getElementById('novoNome').classList.add('err'); toast('Informe o nome', 'error'); return; }
      if (cpf.length !== 11) { document.getElementById('novoCpf').classList.add('err'); toast('CPF deve ter 11 dígitos', 'error'); return; }
      if (!validarCPF(cpf)) { document.getElementById('novoCpf').classList.add('err'); toast('CPF inválido', 'error'); return; }
      if (window.colaboradores.find(c => c.cpfRaw === cpf)) { document.getElementById('novoCpf').classList.add('err'); toast('CPF já cadastrado', 'error'); return; }
      window.saveExtras([...window.extrasDB, { nome, cpf }]);
      document.getElementById('novoNome').value = '';
      document.getElementById('novoCpf').value  = '';
      toast(`${nome} cadastrado!`, 'success');
    };

    let editandoCpfOriginal = null;

    window.renderManage = function(tipo) {
      const busca = document.getElementById(tipo === 'editar' ? 'buscaEditar' : 'buscaExcluir').value.toLowerCase();
      const lista = window.colaboradores.filter(c => !busca || c.nome.toLowerCase().includes(busca) || c.cpfRaw.includes(busca));
      const el = document.getElementById(tipo === 'editar' ? 'listaEditar' : 'listaExcluir');
      if (!lista.length) { el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px;">Nenhum encontrado</div>'; return; }
      el.innerHTML = lista.map(c => {
        const isFixed = c.source === 'fixed';
        const badge = isFixed ? '<span class="manage-item-source fixed">Padrão</span>' : '<span class="manage-item-source custom">Cadastrado</span>';
        if (tipo === 'editar')
          return `<div class="manage-item">${badge}<div class="manage-item-info"><div class="manage-item-nome">${esc(c.nome)}</div><div class="manage-item-cpf">${esc(c.cpf)}</div></div><button class="btn-edit-item" onclick="iniciarEdicao('${c.cpfRaw}')"><i class="fas fa-pen"></i></button></div>`;
        else
          return `<div class="manage-item">${badge}<div class="manage-item-info"><div class="manage-item-nome">${esc(c.nome)}</div><div class="manage-item-cpf">${esc(c.cpf)}</div></div><button class="btn-del-item" onclick="pedirExclusao('${c.cpfRaw}','${esc(c.nome)}')"><i class="fas fa-trash"></i></button></div>`;
      }).join('');
    };

    window.iniciarEdicao = function(cpfRaw) {
      const c = window.colaboradores.find(x => x.cpfRaw === cpfRaw);
      if (!c) return;
      editandoCpfOriginal = cpfRaw;
      document.getElementById('editNome').value = c.nome;
      document.getElementById('editCpf').value  = c.cpfRaw;
      document.getElementById('formEditar').style.display = 'block';
    };

    window.salvarEdicao = function() {
      const nome = document.getElementById('editNome').value.trim().toUpperCase();
      const cpf  = document.getElementById('editCpf').value.trim().replace(/\D/g,'');
      if (!nome) { toast('Informe o nome', 'error'); return; }
      if (cpf.length !== 11) { toast('CPF deve ter 11 dígitos', 'error'); return; }
      if (!validarCPF(cpf)) { toast('CPF inválido', 'error'); return; }
      if (window.colaboradores.filter(c => c.cpfRaw !== editandoCpfOriginal).find(c => c.cpfRaw === cpf)) { toast('CPF já em uso', 'error'); return; }
      const extrasCpy = [...window.extrasDB];
      const idx = extrasCpy.findIndex(c => c.cpf === editandoCpfOriginal);
      if (idx !== -1) extrasCpy[idx] = { nome, cpf };
      else             extrasCpy.push({ nome, cpf, overrideCpf: editandoCpfOriginal });
      window.saveExtras(extrasCpy);
      cancelarEdicao();
      toast('Atualizado!', 'success');
    };

    window.cancelarEdicao = function() {
      editandoCpfOriginal = null;
      document.getElementById('formEditar').style.display = 'none';
      document.getElementById('editNome').value = '';
      document.getElementById('editCpf').value  = '';
    };

    let pendingDelCpf = null;

    window.pedirExclusao = function(cpfRaw, nome) {
      pendingDelCpf = cpfRaw;
      document.getElementById('delConfirmMsg').textContent = `Excluir "${nome}"?`;
      document.getElementById('delConfirm').classList.add('show');
    };

    window.confirmarExclusao = function() {
      if (!pendingDelCpf) return;
      const isBase = window.colabBase.find(b => b.cpfRaw === pendingDelCpf);
      if (isBase) window.saveDeleted([...window.deletedDB, pendingDelCpf]);
      else         window.saveExtras(window.extrasDB.filter(c => c.cpf !== pendingDelCpf));
      cancelarExclusao();
      toast('Excluído', 'success');
    };

    window.cancelarExclusao = function() {
      pendingDelCpf = null;
      document.getElementById('delConfirm').classList.remove('show');
    };
  </script>
</body>
</html>
