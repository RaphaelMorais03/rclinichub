<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro — Amor Saúde Pirituba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:     #0A1F44;
      --navy-mid: #122b5e;
      --red:      #C62828;
      --red-h:    #ad1f1f;
      --white:    #ffffff;
      --gray-50:  #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --green:    #15803d;
      --green-bg: rgba(21,128,61,.1);
      --shadow:   0 4px 20px rgba(10,31,68,.1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Barra topo vermelha ── */
    .red-bar { height: 3px; background: var(--red); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }

    /* ── TELA DE SENHA ── */
    .senha-overlay {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .senha-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      animation: popIn .4s cubic-bezier(.34,1.4,.64,1) both;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .senha-top { text-align: center; margin-bottom: 28px; }
    .senha-icon {
      width: 60px; height: 60px;
      background: var(--navy);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }
    .senha-title { font-size: 22px; font-weight: 800; color: var(--navy); letter-spacing: -.5px; margin-bottom: 5px; }
    .senha-sub   { font-size: 13px; color: var(--gray-400); }

    .senha-field { margin-bottom: 16px; }
    .senha-field label {
      display: block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: var(--gray-500); margin-bottom: 8px;
    }
    .senha-wrap { position: relative; }
    .senha-wrap input {
      width: 100%;
      padding: 13px 44px 13px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 11px;
      font-family: inherit; font-size: 15px;
      color: var(--gray-800); background: var(--gray-50);
      outline: none; letter-spacing: 3px;
      transition: border-color .2s, box-shadow .2s;
    }
    .senha-wrap input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,31,68,.09); }
    .senha-wrap input.err { border-color: var(--red); box-shadow: 0 0 0 3px rgba(198,40,40,.09); }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--gray-400);
      font-size: 15px; padding: 4px; transition: color .15s;
    }
    .eye-btn:hover { color: var(--navy); }

    .senha-err {
      display: none; align-items: center; gap: 8px;
      background: #fff5f5; border: 1px solid #fecaca;
      border-radius: 9px; padding: 10px 13px;
      margin-bottom: 14px; font-size: 13px; color: var(--red); font-weight: 500;
    }
    .senha-err.show { display: flex; animation: shake .38s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

    .btn-entrar {
      width: 100%; padding: 14px;
      background: var(--navy); color: white;
      border: none; border-radius: 11px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      box-shadow: 0 4px 18px rgba(10,31,68,.28);
      transition: background .2s, transform .15s;
    }
    .btn-entrar:hover { background: var(--navy-mid); transform: translateY(-1px); }
    .btn-entrar:disabled { opacity: .6; cursor: not-allowed; }

    /* ── SISTEMA ── */
    #sistema { display: none; padding-top: 3px; }

    /* Header */
    .s-header {
      background: white;
      border-bottom: 2px solid var(--gray-200);
      padding: 0 28px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 3px; z-index: 50;
    }
    .s-logo { display: flex; align-items: center; gap: 12px; }
    .s-logo-icon {
      width: 40px; height: 40px;
      background: transparent; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .s-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .s-logo-name { font-size: 16px; font-weight: 800; color: var(--navy); letter-spacing: -.3px; }
    .s-logo-sub  { font-size: 10px; font-weight: 500; color: var(--gray-400); }
    .s-header-right { display: flex; align-items: center; gap: 10px; }
    .s-badge {
      background: #fff0f0; color: var(--red);
      border: 1px solid rgba(198,40,40,.2);
      border-radius: 20px; font-size: 11px; font-weight: 700;
      padding: 4px 12px; display: flex; align-items: center; gap: 5px;
    }
    .s-badge i { font-size: 10px; }
    .back-btn {
      background: var(--red); color: white;
      border: none; border-radius: 8px;
      padding: 6px 14px; font-family: inherit;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background .2s;
    }
    .back-btn:hover { background: var(--red-h); }

    /* Content */
    .content { max-width: 1000px; margin: 0 auto; padding: 28px 24px 60px; }

    /* Panel */
    .panel {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .panel-title {
      font-size: 16px; font-weight: 800;
      color: var(--navy); margin-bottom: 22px;
      display: flex; align-items: center; gap: 9px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .panel-title i { color: var(--red); font-size: 15px; }

    /* Form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .7px; text-transform: uppercase;
      color: var(--gray-500);
    }
    .f-input, .f-select {
      padding: 11px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-family: inherit; font-size: 14px;
      color: var(--gray-800); background: var(--gray-50);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .f-input:focus, .f-select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(10,31,68,.08);
      background: white;
    }
    .f-select { appearance: none; -webkit-appearance: none; cursor: pointer; }
    .date-row { display: flex; gap: 8px; }
    .date-row .f-input { flex: 1; }

    /* Busca */
    .busca-wrap { position: relative; }
    .busca-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 13px; pointer-events: none; }
    .busca-wrap .f-input { padding-left: 36px; }

    /* Selecionar todos */
    .sel-todos {
      display: flex; align-items: center; gap: 10px;
      background: var(--gray-50); border: 1.5px solid var(--gray-200);
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      transition: border-color .2s;
    }
    .sel-todos:hover { border-color: var(--navy); }
    .sel-todos input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--navy); cursor: pointer; }
    .sel-todos label { font-size: 13px; font-weight: 600; color: var(--gray-600); cursor: pointer; margin: 0; }

    /* Lista de colaboradores */
    .colab-list {
      border: 1.5px solid var(--gray-200);
      border-radius: 12px; background: white;
      max-height: 340px; overflow-y: auto;
      margin: 14px 0;
    }
    .colab-list::-webkit-scrollbar { width: 5px; }
    .colab-list::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
    .colab-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--gray-100);
      transition: background .12s;
      cursor: pointer;
    }
    .colab-item:last-child { border-bottom: none; }
    .colab-item:hover { background: var(--gray-50); }
    .colab-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--navy); cursor: pointer; flex-shrink: 0; }
    .colab-item label { font-size: 13px; color: var(--gray-700); cursor: pointer; margin: 0; line-height: 1.3; }
    .colab-item label span { font-size: 11px; color: var(--gray-400); display: block; }

    /* Contador selecionados */
    .sel-count {
      font-size: 12px; color: var(--gray-500);
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px;
    }
    .sel-count strong { color: var(--navy); }

    /* Botões ação */
    .action-btns { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
    .btn-gerar {
      padding: 12px 24px;
      background: var(--navy); color: white;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(10,31,68,.25);
      transition: background .2s, transform .15s;
    }
    .btn-gerar:hover { background: var(--navy-mid); transform: translateY(-1px); }
    .btn-limpar {
      padding: 12px 20px;
      background: var(--gray-100); color: var(--gray-600);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all .2s;
    }
    .btn-limpar:hover { background: var(--gray-200); color: var(--gray-800); }

    /* Toast */
    .toast-box {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 11px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 9px; color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
      animation: slideIn .3s ease;
      max-width: 320px;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    .toast.success { background: #15803d; }
    .toast.error   { background: var(--red); }
    .toast.info    { background: var(--navy); }


    /* ── CRUD Modal ── */
    .crud-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,31,68,.55); z-index: 300;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px); padding: 20px;
    }
    .crud-overlay.open { display: flex; }
    .crud-modal {
      background: white; border-radius: 18px;
      width: 100%; max-width: 820px; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,.3);
      animation: popIn .3s cubic-bezier(.34,1.4,.64,1) both;
      overflow: hidden;
    }
    .crud-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .crud-header h3 { font-size: 16px; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 8px; }
    .crud-close {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 8px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gray-500); font-size: 14px;
      transition: all .15s;
    }
    .crud-close:hover { background: var(--gray-200); color: var(--gray-800); }
    .crud-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .crud-body::-webkit-scrollbar { width: 5px; }
    .crud-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

    /* Tabs dentro do modal */
    .crud-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
    .crud-tab {
      padding: 8px 18px; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; border: 1.5px solid var(--gray-200);
      background: var(--gray-50); color: var(--gray-500);
      transition: all .18s; display: flex; align-items: center; gap: 7px;
    }
    .crud-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
    .crud-tab:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Form cadastro */
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--gray-500); margin-bottom: 7px; }
    .form-field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-family: inherit; font-size: 14px; color: var(--gray-800); background: var(--gray-50); outline: none; transition: border-color .2s, box-shadow .2s; }
    .form-field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,31,68,.08); background: white; }
    .form-field input.err { border-color: var(--red); box-shadow: 0 0 0 3px rgba(198,40,40,.08); }

    .btn-salvar {
      padding: 11px 22px;
      background: var(--navy); color: white;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: background .2s, transform .15s;
      box-shadow: 0 4px 14px rgba(10,31,68,.22);
    }
    .btn-salvar:hover { background: var(--navy-mid); transform: translateY(-1px); }

    /* Lista colaboradores no CRUD */
    .manage-list {
      border: 1.5px solid var(--gray-200); border-radius: 12px;
      overflow: hidden; background: white;
    }
    .manage-item {
      display: flex; align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--gray-100);
      gap: 12px; transition: background .12s;
    }
    .manage-item:last-child { border-bottom: none; }
    .manage-item:hover { background: var(--gray-50); }
    .manage-item-info { flex: 1; min-width: 0; }
    .manage-item-nome { font-size: 13px; font-weight: 600; color: var(--gray-800); }
    .manage-item-cpf  { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .manage-item-source {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 8px; border-radius: 10px;
    }
    .manage-item-source.fixed { background: #e0f2fe; color: #0369a1; }
    .manage-item-source.custom { background: #dcfce7; color: #166534; }
    .btn-edit-item {
      background: rgba(10,31,68,.08); border: none; border-radius: 7px;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--navy); font-size: 12px; transition: all .15s; flex-shrink: 0;
    }
    .btn-edit-item:hover { background: var(--navy); color: white; }
    .btn-del-item {
      background: rgba(198,40,40,.08); border: none; border-radius: 7px;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--red); font-size: 12px; transition: all .15s; flex-shrink: 0;
    }
    .btn-del-item:hover { background: var(--red); color: white; }
    .manage-search-wrap { position: relative; margin-bottom: 14px; }
    .manage-search-wrap .f-input { padding-left: 36px; }

    /* Confirmar exclusão inline */
    .del-confirm {
      display: none; align-items: center; gap: 10px;
      background: #fff5f5; border: 1px solid #fecaca;
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 14px; font-size: 13px;
    }
    .del-confirm.show { display: flex; }
    .del-confirm span { flex: 1; color: var(--red); font-weight: 500; }
    .btn-del-confirm { padding: 6px 14px; background: var(--red); color: white; border: none; border-radius: 7px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-del-cancel  { padding: 6px 14px; background: var(--gray-200); color: var(--gray-700); border: none; border-radius: 7px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; }

    /* Responsivo */
    @media (max-width: 700px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .content { padding: 16px 14px 60px; }
    }

    /* ── IMPRESSÃO — NÃO ALTERAR ── */
    @media print {
      .red-bar, #sistema .s-header, .content .panel,
      .toast-box, .back-btn { display: none !important; }
      body { background: white; }
      .recibo-print {
        border: 2px solid #000;
        padding: 0.7cm;
        margin-bottom: 0.8cm;
        page-break-inside: avoid;
        break-inside: avoid;
        font-family: Arial, sans-serif;
        background: white;
        color: black;
      }
      .recibo-print .titulo { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px; }
      .recibo-print .empresa { font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 12px; }
      .recibo-print .empregado { font-size: 12px; font-weight: bold; margin-bottom: 12px; }
      .recibo-print .texto { font-size: 12px; line-height: 1.5; margin-bottom: 15px; }
      .recibo-print .data-local { text-align: center; font-size: 12px; margin-bottom: 15px; }
      .recibo-print .assinatura { text-align: center; margin-top: 5px; }
      .recibo-print .linha-assinatura { width: 70%; margin: 0 auto 4px; border-top: 1px solid #000; }
      .recibo-print .nome-assinatura { font-size: 11px; text-transform: uppercase; }
    }
  </style>
</head>
<body>
  <div class="red-bar"></div>

  <!-- Toast container -->
  <div class="toast-box" id="toastBox"></div>

  <!-- Verificação de sessão — sem tela de senha -->
  <div id="senhaOverlay" style="display:none;"></div>

  <!-- ══ SISTEMA PRINCIPAL ══ -->
  <div id="sistema">

    <!-- Header -->
    <div class="s-header">
      <div class="s-logo">
        <div class="s-logo-icon">
          <img src="__logoamor.ico__" alt="Logo" onerror="this.parentElement.innerHTML='<span style=\'font-size:22px\'>🏥</span>'">
        </div>
        <div>
          <div class="s-logo-name">Amor Saúde</div>
          <div class="s-logo-sub">Financeiro · Pirituba</div>
        </div>
      </div>
      <div class="s-header-right">
        <div class="s-badge"><i class="fas fa-shield-halved"></i> Acesso Restrito</div>
        <button class="back-btn" onclick="irPara('login.html')">
          <i class="fas fa-home"></i> Portal
        </button>
      </div>
    </div>

    <!-- Conteúdo -->
    <div class="content">

      <!-- Painel colaboradores -->
      <div class="panel">
        <div class="panel-title" style="justify-content:space-between;">
          <span><i class="fas fa-users"></i> Colaboradores</span>
          <button onclick="abrirCrud()" style="padding:7px 16px;background:var(--navy);color:white;border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;"><i class="fas fa-user-gear"></i> Gerenciar</button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Buscar colaborador</label>
            <div class="busca-wrap">
              <i class="fas fa-search busca-icon"></i>
              <input class="f-input" type="text" id="buscaColab" placeholder="Nome ou CPF..." oninput="filtrarColab()">
            </div>
          </div>
          <div class="form-group" style="justify-content:flex-end;">
            <label class="form-label">Seleção rápida</label>
            <div class="sel-todos" onclick="document.getElementById('chkTodos').click()">
              <input type="checkbox" id="chkTodos" onchange="toggleTodos()">
              <label for="chkTodos">Marcar / Desmarcar todos</label>
            </div>
          </div>
        </div>

        <div class="colab-list" id="colabList"></div>
        <div class="sel-count" id="selCount"><strong id="selNum">0</strong> colaborador(es) selecionado(s)</div>
      </div>

      <!-- Painel recibo -->
      <div class="panel">
        <div class="panel-title">
          <i class="fas fa-file-invoice-dollar"></i> Dados do Recibo
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Categoria *</label>
            <select class="f-select" id="categoria">
              <option value="">Selecione...</option>

  <script>

    // ── Logo dinâmica Firebase ──
    let LOGO_FIN = sessionStorage.getItem('logoDataUrl') || '';
    (async function carregarLogoFin() {
      try {
        if (!LOGO_FIN) {
          const r = await fetch('https://clinica-pirituba-default-rtdb.firebaseio.com/admin/logo.json');

    // ── Verificação de sessão (Firebase Auth via login.html) ──
    function verificarSessao() {
      const uid = sessionStorage.getItem('uid');
      if (!uid) {
        irPara('login.html');
        return;
      }
      document.getElementById('sistema').style.display = 'block';
      colaboradores = getColaboradores();
      renderColab(colaboradores);
    }

    // ── Navegação robusta (GitHub Pages) ──
    function irPara(arquivo) {
      var href = window.location.href.split('?')[0].split('#')[0];
      var base = href.substring(0, href.lastIndexOf('/') + 1);
      window.location.replace(base + arquivo);
    }

    // ── Toast ──
    function toast(msg, tipo = 'info') {
      const box = document.getElementById('toastBox');
      const t = document.createElement('div');
      t.className = `toast ${tipo}`;
      const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle' };
      t.innerHTML = `<i class="fas ${icons[tipo]||icons.info}"></i> ${msg}`;
      box.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    // ── Máscara moeda ──
    function mascaraMoeda(el) {
      let v = el.value.replace(/\D/g, '');
      v = (parseInt(v || '0') / 100).toFixed(2) + '';
      v = v.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      el.value = v;
    }

    function parseValor(v) {
      if (!v) return 0;
      return parseFloat(v.replace(/\./g, '').replace(',', '.')) || 0;
    }

    function fmtMoeda(v) {
      return v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function formatCPF(cpf) {
      return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    // ── Valor por extenso ──
    function valorExtenso(valor) {
      if (valor === 0) return 'zero reais';
      const uni = ['','um','dois','três','quatro','cinco','seis','sete','oito','nove'];
      const dez = ['','dez','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
      const esp = ['dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
      const cen = ['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];

      let inteiro = Math.floor(valor);
      let centavos = Math.round((valor - inteiro) * 100);

      function conv(n) {
        if (n === 0) return '';
        if (n === 100) return 'cem';
        if (n >= 1000) {
          let m = Math.floor(n / 1000), r = n % 1000;
          return (m === 1 ? 'mil' : conv(m) + ' mil') + (r > 0 ? ' e ' + conv(r) : '');
        }
        let c = Math.floor(n / 100), d = Math.floor((n % 100) / 10), u = n % 10;
        let s = '';
        if (c) s += cen[c];
        if (c && (d || u)) s += ' e ';
        if (d === 1) s += esp[u];
        else { if (d) s += dez[d]; if (d && u) s += ' e '; if (u) s += uni[u]; }
        return s;
      }

      let ext = conv(inteiro) + (inteiro === 1 ? ' real' : ' reais');
      if (centavos > 0) ext += ' e ' + conv(centavos) + (centavos === 1 ? ' centavo' : ' centavos');
      return ext;
    }

      { nome: "LORENA PINHOTI DA COSTA",              cpf: "41547345802" },
      { nome: "LUIZA REBECA RIBEIRO DE OLIVEIRA",     cpf: "54269030852" },
      { nome: "MARIANA SANTOS DA ANUNCIAÇÃO",         cpf: "51757278850" },

      { nome: "VINICIUS RODRIGO DA SILVA OLIVEIRA",   cpf: "36675394878" },
      { nome: "VIVIANE LUCIENE RODRIGUES NEVES",      cpf: "08989207444" },
      { nome: "YANE RILMARA SALVADOR",                cpf: "12488636401" }
    ];

    // Base fixa — sempre presente
    const colabBase = colaboradoresRaw.map(c => ({
      nome: c.nome, cpfRaw: c.cpf, cpf: formatCPF(c.cpf), source: 'fixed'
    }));

    // Carrega extras do localStorage
    function loadExtras() {
      try { return JSON.parse(localStorage.getItem('financeiro_colab') || '[]'); }
      catch(e) { return []; }
    }
    function saveExtras(arr) {
      localStorage.setItem('financeiro_colab', JSON.stringify(arr));
    }

    // Lista completa mesclada e ordenada
    function getColaboradores() {
      const extras  = loadExtras();
      const deleted = JSON.parse(localStorage.getItem('financeiro_deleted') || '[]');
      // CPFs de base que foram sobrescritos por extras
      const overridden = extras.filter(e => e.overrideCpf).map(e => e.overrideCpf);

      // Base: excluir deletados e sobrescritos
      const base = colabBase
        .filter(b => !deleted.includes(b.cpfRaw) && !overridden.includes(b.cpfRaw))
        .map(b => ({ ...b, source: 'fixed' }));

      // Extras normais (sem overrideCpf)
      const extraList = extras.map(e => ({
        nome: e.nome,
        cpfRaw: e.cpf,
        cpf: formatCPF(e.cpf),
        source: e.overrideCpf ? 'edited' : 'custom'
      }));

      return [...base, ...extraList].sort((a, b) => a.nome.localeCompare(b.nome));
    }

    // Alias para compatibilidade com código existente
    let colaboradores = getColaboradores();


    function renderColab(lista) {
      const el = document.getElementById('colabList');
      if (!lista.length) {
        el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px;">Nenhum colaborador encontrado</div>';
        return;
      }
      el.innerHTML = lista.map(c => `
        <div class="colab-item" id="ci_${c.cpfRaw}" onclick="selecionarColab(this,'${c.cpfRaw}')">
          <input type="checkbox" class="colab-chk" value="${c.cpfRaw}" data-nome="${c.nome}" onchange="atualizarContador()" onclick="event.stopPropagation()">
          <label onclick="event.preventDefault()">${c.nome}<span>${c.cpf}</span></label>
          <div class="colab-actions" id="ca_${c.cpfRaw}" style="display:none;gap:6px;margin-left:auto;align-items:center;">
            <button onclick="event.stopPropagation();iniciarEdicaoRapida('${c.cpfRaw}')" style="padding:5px 10px;background:var(--navy);color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;"><i class="fas fa-pen"></i> Editar</button>
            <button onclick="event.stopPropagation();pedirExclusaoRapida('${c.cpfRaw}')" style="padding:5px 10px;background:var(--red);color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;"><i class="fas fa-trash"></i> Excluir</button>
          </div>
        </div>
      `).join('');
    }

    let colabSelecionado = null;

    function selecionarColab(el, cpf) {
      const chk = el.querySelector('.colab-chk');
      if (chk) { chk.checked = !chk.checked; atualizarContador(); }

      if (colabSelecionado && colabSelecionado !== cpf) {
        const prevA = document.getElementById('ca_' + colabSelecionado);
        const prevI = document.getElementById('ci_' + colabSelecionado);
        if (prevA) prevA.style.display = 'none';
        if (prevI) prevI.style.background = '';
      }

      const actions = document.getElementById('ca_' + cpf);
      const isOpen  = actions && actions.style.display !== 'none';
      if (actions) actions.style.display = isOpen ? 'none' : 'flex';
      el.style.background = isOpen ? '' : 'var(--gray-50)';
      colabSelecionado = isOpen ? null : cpf;
    }

    function iniciarEdicaoRapida(cpf) {
      const colab = getColaboradores().find(c => c.cpfRaw === cpf);
      if (!colab) return;
      abrirCrud();
      setTimeout(() => {
        mudarTab('editar');
        const busca = document.getElementById('buscaEditar');
        if (busca) { busca.value = colab.nome; renderManage('editar'); }
        setTimeout(() => {
          const btns = document.querySelectorAll('#listaEditar .edit-btn');
          btns.forEach(btn => { if (btn.dataset && btn.dataset.cpf === cpf) btn.click(); });
        }, 150);
      }, 60);
    }

    function pedirExclusaoRapida(cpf) {
      const colab = getColaboradores().find(c => c.cpfRaw === cpf);
      const nome  = colab ? colab.nome : cpf;
      if (!confirm('Excluir ' + nome + '?\nEsta ação não pode ser desfeita.')) return;
      colaboradores = colaboradores.filter(c => c.cpfRaw !== cpf);
      saveExtras(colaboradores);
      colabSelecionado = null;
      renderColab(colaboradores);
      atualizarContador();
      toast('Colaborador removido.', 'info');
    }


    function toggleCheck(div) {
      const cb = div.querySelector('.colab-chk');
      cb.checked = !cb.checked;
      atualizarContador();
    }

    function filtrarColab() {
      const t = document.getElementById('buscaColab').value.toLowerCase();
      colaboradores = getColaboradores();
      if (!t) { renderColab(colaboradores); return; }
      const f = colaboradores.filter(c => c.nome.toLowerCase().includes(t) || c.cpfRaw.includes(t));
      renderColab(f);
    }

    function toggleTodos() {
      const sel = document.getElementById('chkTodos').checked;
      document.querySelectorAll('.colab-chk').forEach(cb => cb.checked = sel);
      atualizarContador();
    }

    function atualizarContador() {
      const n = document.querySelectorAll('.colab-chk:checked').length;
      document.getElementById('selNum').textContent = n;
    }

    // ── Gerar recibos ──
    function gerarRecibos() {
      const checks = document.querySelectorAll('.colab-chk:checked');
      if (!checks.length) { toast('Selecione pelo menos um colaborador', 'error'); return; }

      const cat   = document.getElementById('categoria').value;
      const val   = parseValor(document.getElementById('valor').value);
      const inicio = document.getElementById('dtInicio').value;
      const fim    = document.getElementById('dtFim').value;

      if (!cat) { toast('Selecione a categoria do recibo', 'error'); return; }
      if (val <= 0) { toast('Informe um valor válido', 'error'); return; }

      const selecionados = [...checks].map(cb => ({
        nome: cb.dataset.nome,
        cpfRaw: cb.value,
        cpf: formatCPF(cb.value)
      }));

      const win = window.open('', '_blank');
      if (!win) { toast('Permita pop-ups no navegador', 'error'); return; }

      let recibosHTML = '';
      selecionados.forEach((col, i) => {
        recibosHTML += buildRecibo(col, cat, val, inicio, fim);
        if ((i + 1) % 4 === 0 && i + 1 < selecionados.length) {
          recibosHTML += '<div style="page-break-after:always;"></div>';
        }
      });

      win.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Recibos</title>
<style>
  @page { size: A4; margin: 0.8cm; }
  body { font-family: Arial, sans-serif; background: white; margin:0; padding:0; }
  .recibo-print { border: 2px solid #000; padding: 0.6cm; margin-bottom: 0.7cm; page-break-inside: avoid; }
  .recibo-print .titulo { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px; }
  .recibo-print .empresa { font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 12px; }
  .recibo-print .empregado { font-size: 12px; font-weight: bold; margin-bottom: 12px; }
  .recibo-print .texto { font-size: 12px; line-height: 1.5; margin-bottom: 15px; }
  .recibo-print .data-local { text-align: center; font-size: 12px; margin-bottom: 15px; }
  .recibo-print .assinatura { text-align: center; margin-top: 5px; }
  .recibo-print .linha-assinatura { width: 70%; margin: 0 auto 4px; border-top: 1px solid #000; }
  .recibo-print .nome-assinatura { font-size: 11px; text-transform: uppercase; }
  .logo-recibo { display: flex; align-items: center; margin-bottom: 10px; }
  .logo-recibo img { height: 50px; width: auto; max-width: 150px; object-fit: contain; }
</style>
</head><body>${recibosHTML}</body></html>`);
      win.document.close();
      win.print();

      toast(`${selecionados.length} recibo(s) gerado(s) com sucesso!`, 'success');
    }

    function buildRecibo(col, categoria, valor, inicio, fim) {
      const valorF  = fmtMoeda(valor);
      const extenso = valorExtenso(valor);
      const catLow  = categoria.toLowerCase();

      let periodo = '';
      if (inicio && fim) {
        const di = inicio.split('-').reverse().join('/');
        const df = fim.split('-').reverse().join('/');
        periodo = ` para utilização no período de <strong>${di} a ${df}</strong>`;
      }

      const titulo = categoria === 'Vale-Transporte'
        ? 'Recibo de entrega de vale-transporte'
        : `Recibo de ${categoria}`;

      return `
        <div class="recibo-print">
          <div class="titulo">${titulo}</div>
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
            \${LOGO_FIN ? \`<img src="\${LOGO_FIN}" style="height:50px;width:auto;max-width:140px;object-fit:contain;" alt="Logo">\` : '<span style="font-size:14px;font-weight:900;color:#000;">Amor Saúde</span>'}
          </div>
          <div class="empresa">
            <span>SIM CLÍNICA MÉDICA E ODONTOLÓGICA LTDA</span>
            <span>CNPJ: 25.154.224/0001-89</span>
          </div>
          <div class="empregado">Nome do Empregado: ${col.nome} - CPF ${col.cpf}</div>
          <div class="texto">
            Recebi da empresa Sim Clínica Médica e Odontológica LTDA, o equivalente a
            <strong>R$ ${valorF} ( ${extenso} )</strong> de ${catLow}${periodo}.
          </div>
          <div class="data-local">São Paulo, ____/_____/_____.</div>
          <div class="assinatura">
            <div class="linha-assinatura"></div>
            <div class="nome-assinatura">${col.nome}</div>
          </div>
        </div>`;
    }

    function limpar() {
      document.getElementById('buscaColab').value = '';
      document.getElementById('categoria').value = '';
      document.getElementById('formaPag').value = 'pix';
      document.getElementById('dtInicio').value = '';
      document.getElementById('dtFim').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('chkTodos').checked = false;
      colaboradores = getColaboradores();
      renderColab(colaboradores);
      atualizarContador();
      toast('Formulário limpo', 'info');
    }

    // ══════════════════════════════════════
    // CRUD DE COLABORADORES
    // ══════════════════════════════════════
    let pendingDelCpf = null;

    function abrirCrud() {
      document.getElementById('crudOverlay').classList.add('open');
      mudarTab('criar');
    }

    function fecharCrud() {
      document.getElementById('crudOverlay').classList.remove('open');
      cancelarEdicao();
      cancelarExclusao();
    }

    function fecharCrudBg(e) {
      if (e.target === document.getElementById('crudOverlay')) fecharCrud();
    }

    function mudarTab(tab) {
      ['criar','editar','excluir'].forEach(t => {
        document.getElementById('tabCriar'.replace('criar', 'tab' + t.charAt(0).toUpperCase() + t.slice(1))) .classList.remove('active');
        document.getElementById('paneCriar'.replace('criar', 'pane' + t.charAt(0).toUpperCase() + t.slice(1))).classList.remove('active');
      });
      document.getElementById('tabCriar'.replace('criar', 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1))).classList.add('active');
      document.getElementById('paneCriar'.replace('criar', 'pane' + tab.charAt(0).toUpperCase() + tab.slice(1))).classList.add('active');

      if (tab === 'editar')  renderManage('editar');
      if (tab === 'excluir') renderManage('excluir');
    }

    // ── Criar ──
    function criarColab() {
      const nome = document.getElementById('novoNome').value.trim().toUpperCase();
      const cpf  = document.getElementById('novoCpf').value.trim().replace(/\D/g,'');
      const nEl  = document.getElementById('novoNome');
      const cEl  = document.getElementById('novoCpf');
      nEl.classList.remove('err'); cEl.classList.remove('err');

      if (!nome) { nEl.classList.add('err'); toast('Informe o nome', 'error'); return; }
      if (cpf.length !== 11) { cEl.classList.add('err'); toast('CPF deve ter 11 dígitos', 'error'); return; }

      const todos = getColaboradores();
      if (todos.find(c => c.cpfRaw === cpf)) {
        cEl.classList.add('err'); toast('CPF já cadastrado', 'error'); return;
      }

      const extras = loadExtras();
      extras.push({ nome, cpf });
      saveExtras(extras);

      document.getElementById('novoNome').value = '';
      document.getElementById('novoCpf').value = '';

      colaboradores = getColaboradores();
      renderColab(colaboradores);
      toast(`${nome} cadastrado com sucesso!`, 'success');
    }

    // ── Editar ──
    let editandoCpfOriginal = null;

    function renderManage(tipo) {
      const busca = document.getElementById(tipo === 'editar' ? 'buscaEditar' : 'buscaExcluir').value.toLowerCase();
      const lista = getColaboradores().filter(c =>
        !busca || c.nome.toLowerCase().includes(busca) || c.cpfRaw.includes(busca)
      );
      const el = document.getElementById(tipo === 'editar' ? 'listaEditar' : 'listaExcluir');
      if (!lista.length) { el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px;">Nenhum colaborador encontrado</div>'; return; }

      el.innerHTML = lista.map(c => {
        const isFixed = c.source === 'fixed';
        const badge = isFixed
          ? '<span class="manage-item-source fixed">Padrão</span>'
          : '<span class="manage-item-source custom">Cadastrado</span>';

        if (tipo === 'editar') {
          return `<div class="manage-item">${badge}<div class="manage-item-info"><div class="manage-item-nome">${c.nome}</div><div class="manage-item-cpf">${c.cpf}</div></div><button class="btn-edit-item" onclick="iniciarEdicao('${c.cpfRaw}')" title="Editar"><i class="fas fa-pen"></i></button></div>`;
        } else {
          return `<div class="manage-item">${badge}<div class="manage-item-info"><div class="manage-item-nome">${c.nome}</div><div class="manage-item-cpf">${c.cpf}</div></div><button class="btn-del-item" onclick="pedirExclusao('${c.cpfRaw}','${c.nome.replace(/'/g,"\'")}')}" title="Excluir"><i class="fas fa-trash"></i></button></div>`;
        }
      }).join('');
    }

    function iniciarEdicao(cpfRaw) {
      const c = getColaboradores().find(x => x.cpfRaw === cpfRaw);
      if (!c) return;
      editandoCpfOriginal = cpfRaw;
      document.getElementById('editNome').value = c.nome;
      document.getElementById('editCpf').value  = c.cpfRaw;
      document.getElementById('formEditar').style.display = 'block';
      document.getElementById('editNome').focus();
    }

    function salvarEdicao() {
      const nome = document.getElementById('editNome').value.trim().toUpperCase();
      const cpf  = document.getElementById('editCpf').value.trim().replace(/\D/g,'');
      if (!nome) { document.getElementById('editNome').classList.add('err'); toast('Informe o nome', 'error'); return; }
      if (cpf.length !== 11) { document.getElementById('editCpf').classList.add('err'); toast('CPF deve ter 11 dígitos', 'error'); return; }

      // Check duplicate
      const todos = getColaboradores().filter(c => c.cpfRaw !== editandoCpfOriginal);
      if (todos.find(c => c.cpfRaw === cpf)) { toast('CPF já está em uso', 'error'); return; }

      const extras = loadExtras();
      const idx = extras.findIndex(c => c.cpf === editandoCpfOriginal);
      if (idx !== -1) {
        // já é extra — atualiza
        extras[idx] = { nome, cpf };
      } else {
        // era fixo — adiciona versão sobrescrita como extra e remove do base via override
        extras.push({ nome, cpf, overrideCpf: editandoCpfOriginal });
      }
      saveExtras(extras);
      cancelarEdicao();
      colaboradores = getColaboradores();
      renderColab(colaboradores);
      renderManage('editar');
      toast(`Colaborador atualizado!`, 'success');
    }

    function cancelarEdicao() {
      editandoCpfOriginal = null;
      document.getElementById('formEditar').style.display = 'none';
      document.getElementById('editNome').value = '';
      document.getElementById('editCpf').value  = '';
      document.getElementById('editNome').classList.remove('err');
      document.getElementById('editCpf').classList.remove('err');
    }

    // ── Excluir ──
    function pedirExclusao(cpfRaw, nome) {
      pendingDelCpf = cpfRaw;
      const box = document.getElementById('delConfirm');
      document.getElementById('delConfirmMsg').textContent = `Excluir "${nome}"?`;
      box.classList.add('show');
    }

    function confirmarExclusao() {
      if (!pendingDelCpf) return;
      // Remove do extras se existir, ou marca fixo como deletado
      let extras = loadExtras().filter(c => c.cpf !== pendingDelCpf);
      const isBaseFixed = colabBase.find(b => b.cpfRaw === pendingDelCpf);
      if (isBaseFixed) {
        // Marcar CPF fixo como deletado
        const deleted = JSON.parse(localStorage.getItem('financeiro_deleted') || '[]');
        if (!deleted.includes(pendingDelCpf)) deleted.push(pendingDelCpf);
        localStorage.setItem('financeiro_deleted', JSON.stringify(deleted));
      }
      saveExtras(extras);
      cancelarExclusao();
      colaboradores = getColaboradores();
      renderColab(colaboradores);
      renderManage('excluir');
      toast('Colaborador excluído', 'success');
    }

    function cancelarExclusao() {
      pendingDelCpf = null;
      document.getElementById('delConfirm').classList.remove('show');
    }

    // Iniciar verificação de sessão
    verificarSessao();
  </script>
</body>
</html>
