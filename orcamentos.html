<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos — Amor Saúde Pirituba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="js/firebase-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <style>
    :root{
      --navy:#0A1F44; --navy-mid:#122b5e;
      --red:#C62828;  --red-h:#ad1f1f;
      --teal:#61C1D0; --teal-h:#4fa8b8;
      --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
      --gray-300:#cbd5e1; --gray-400:#94a3b8; --gray-500:#64748b;
      --gray-600:#475569; --gray-800:#1e293b;
      --green:#15803d; --green-bg:#dcfce7;
      --shadow:0 4px 20px rgba(10,31,68,.1);
      --radius:12px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;color:var(--gray-800);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* ── Top bar ── */
    .red-bar{height:3px;background:var(--red);position:fixed;top:0;left:0;right:0;z-index:200;}
    .s-header{background:white;border-bottom:2px solid var(--gray-200);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .s-logo{display:flex;align-items:center;gap:12px;}
    .s-logo-icon{width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .s-logo-icon img{width:100%;height:100%;object-fit:contain;}
    .s-logo-name{font-size:15px;font-weight:800;color:var(--navy);}
    .s-logo-sub{font-size:10px;color:var(--gray-400);}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-pill{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gray-600);display:flex;align-items:center;gap:7px;}
    .user-dot{width:24px;height:24px;border-radius:50%;background:var(--navy);color:white;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
    .btn-sair{background:none;border:1.5px solid var(--gray-200);color:var(--gray-500);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
    .btn-sair:hover{border-color:var(--red);color:var(--red);}
    .back-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
    .back-btn:hover{background:var(--red-h);}

    /* ── Search section ── */
    .search-section{background:white;border-bottom:1px solid var(--gray-200);padding:16px 24px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.04);}
    .search-row{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto;}
    .search-wrap{position:relative;flex:1;}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:15px;pointer-events:none;}
    #searchInput{width:100%;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:30px;padding:11px 16px 11px 42px;font-size:14px;font-family:inherit;outline:none;transition:all .2s;color:var(--gray-800);}
    #searchInput:focus{border-color:var(--navy);background:white;box-shadow:0 0 0 3px rgba(10,31,68,.07);}
    #searchInput::placeholder{color:var(--gray-400);}
    .clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--gray-200);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;color:var(--gray-500);font-size:13px;display:none;align-items:center;justify-content:center;line-height:1;transition:background .15s;}
    .clear-btn.show{display:flex;}
    .clear-btn:hover{background:var(--gray-300);}

    /* admin buttons inline */
    .admin-row{display:flex;gap:6px;}
    .btn-chip-sm{padding:6px 12px;border-radius:20px;background:var(--gray-100);border:1.5px solid var(--gray-200);font-family:inherit;font-size:11px;font-weight:700;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;}
    .btn-chip-sm:hover{border-color:var(--navy);color:var(--navy);background:white;}

    /* filter chips */
    .chips-row{display:none;gap:7px;flex-wrap:wrap;max-width:900px;margin:8px auto 0;padding-top:10px;border-top:1px solid var(--gray-100);}
    .chips-row.open{display:flex;}
    .chip{padding:6px 14px;border-radius:20px;background:var(--gray-50);border:1.5px solid var(--gray-200);font-family:inherit;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .chip:hover{border-color:var(--teal);color:var(--teal);}
    .chip.active{background:var(--navy);color:white;border-color:var(--navy);}
    .btn-filtros{padding:8px 14px;border-radius:20px;background:var(--gray-50);border:1.5px solid var(--gray-200);font-family:inherit;font-size:12px;font-weight:700;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;flex-shrink:0;}
    .btn-filtros:hover{border-color:var(--navy);color:var(--navy);background:white;}
    .btn-filtros.active{border-color:var(--navy);color:var(--navy);background:#eff6ff;}
    .filtros-badge{background:var(--navy);color:white;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;display:none;}
    .filtros-badge.show{display:inline-block;}

    /* ── Main layout ── */
    .layout{display:grid;grid-template-columns:1fr 320px;flex:1;overflow:hidden;gap:0;}
    .main-content{overflow-y:auto;padding:20px 20px 20px 24px;}
    .results-meta{font-size:12px;color:var(--gray-400);font-weight:600;margin-bottom:14px;padding-left:2px;}

    /* ── Exam cards grid ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-content:start;}
    .card{background:white;border:1.5px solid var(--gray-200);border-radius:14px;padding:17px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden;}
    .card::after{content:'';position:absolute;inset:0;border-radius:14px;box-shadow:0 8px 24px rgba(10,31,68,.12);opacity:0;transition:opacity .2s;}
    .card:hover{transform:translateY(-3px);border-color:var(--navy);}
    .card:hover::after{opacity:1;}
    .cat-tag{display:inline-block;padding:3px 9px;border-radius:20px;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;align-self:flex-start;}
    .card-name{font-size:14px;font-weight:700;color:var(--navy);line-height:1.35;}
    .card-forn{font-size:11px;color:var(--gray-400);}
    .card-prices{display:flex;gap:10px;margin-top:auto;padding-top:10px;border-top:1px solid var(--gray-100);}
    .price-box{flex:1;text-align:center;padding:7px 6px;border-radius:8px;}
    .price-box.ct{background:#eff6ff;}
    .price-box.pt{background:#fff1f2;}
    .price-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
    .price-box.ct .price-lbl{color:#3b82f6;}
    .price-box.pt .price-lbl{color:var(--red);}
    .price-val{font-size:14px;font-weight:800;}
    .price-box.ct .price-val{color:#1d4ed8;}
    .price-box.pt .price-val{color:var(--red);}
    .price-null{color:var(--gray-300);font-size:12px;}

    /* empty / loader */
    .empty{text-align:center;padding:60px 24px;color:var(--gray-400);}
    .empty i{font-size:36px;margin-bottom:14px;opacity:.3;display:block;}
    .empty h3{color:var(--gray-500);margin-bottom:6px;font-size:16px;}
    .empty p{font-size:13px;line-height:1.6;}
    .loader{text-align:center;padding:48px;}
    .spinner{display:inline-block;width:34px;height:34px;border:3px solid var(--gray-200);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px;}
    .loader p{color:var(--gray-400);font-size:13px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Cart panel ── */
    .cart-panel{background:white;border-left:1px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden;}
    .cart-head{padding:16px 18px;border-bottom:2px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .cart-title{font-size:14px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;}
    .cart-badge{background:var(--navy);color:white;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
    .cart-clear{background:none;border:none;color:var(--gray-400);font-size:11px;font-weight:600;cursor:pointer;transition:color .15s;}
    .cart-clear:hover{color:var(--red);}
    .cart-items{flex:1;overflow-y:auto;padding:10px 12px;}
    .cart-empty{text-align:center;padding:36px 12px;color:var(--gray-400);font-size:13px;line-height:1.6;}
    .cart-empty i{font-size:28px;margin-bottom:10px;display:block;opacity:.3;}
    .cart-item{padding:10px 0;border-bottom:1px solid var(--gray-100);display:flex;gap:9px;align-items:flex-start;}
    .cart-item:last-child{border-bottom:none;}
    .cart-item-info{flex:1;min-width:0;}
    .cart-item-name{font-size:12px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:2px;}
    .cart-item-tipo{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
    .cart-item-preco{font-size:12px;font-weight:800;margin-top:3px;}
    .cart-item-preco.ct{color:#1d4ed8;}
    .cart-item-preco.pt{color:var(--red);}
    .cart-rm{background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;line-height:1;transition:all .15s;flex-shrink:0;}
    .cart-rm:hover{background:#fee2e2;color:var(--red);}
    .cart-footer{padding:14px 16px;border-top:2px solid var(--gray-100);flex-shrink:0;}
    .cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .cart-total-lbl{font-size:13px;font-weight:700;color:var(--gray-600);}
    .cart-total-val{font-size:20px;font-weight:900;color:var(--navy);letter-spacing:-1px;}
    .cart-btn{width:100%;padding:11px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:7px;transition:all .2s;}
    .cart-btn:last-child{margin-bottom:0;}
    .cart-btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-copy{background:var(--navy);color:white;}
    .btn-copy:hover:not(:disabled){background:var(--navy-mid);}
    .btn-pdf{background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200);}
    .btn-pdf:hover:not(:disabled){background:var(--gray-200);}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(10,31,68,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:white;border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.3);}
    .modal-head{padding:20px 24px 16px;border-bottom:2px solid var(--gray-100);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;position:sticky;top:0;background:white;z-index:5;}
    .modal-titles{flex:1;}
    .modal-name{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:5px;letter-spacing:-.3px;}
    .modal-meta{display:flex;gap:6px;flex-wrap:wrap;}
    .modal-tag{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--gray-100);color:var(--gray-600);font-weight:700;}
    .modal-close{background:var(--gray-100);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;color:var(--gray-500);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
    .modal-close:hover{background:var(--gray-200);color:var(--navy);}
    .modal-body{padding:20px 24px;}
    .modal-prices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
    .mpbox{padding:14px;border-radius:12px;text-align:center;}
    .mpbox.ct{background:#eff6ff;border:1.5px solid #bfdbfe;}
    .mpbox.pt{background:#fff1f2;border:1.5px solid #fecdd3;}
    .mpbox-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .mpbox.ct .mpbox-lbl{color:#3b82f6;}
    .mpbox.pt .mpbox-lbl{color:var(--red);}
    .mpbox-val{font-size:22px;font-weight:900;}
    .mpbox.ct .mpbox-val{color:#1d4ed8;}
    .mpbox.pt .mpbox-val{color:var(--red);}
    .modal-section{margin-bottom:14px;}
    .modal-section-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:5px;}
    .modal-section textarea{width:100%;border:1.5px solid var(--gray-200);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;resize:vertical;min-height:64px;outline:none;color:var(--gray-800);background:var(--gray-50);transition:border-color .2s;}
    .modal-section textarea:focus{border-color:var(--navy);background:white;}
    .modal-actions{display:flex;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--gray-100);}
    .modal-actions button{flex:1;padding:11px 8px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
    .modal-actions button:disabled{opacity:.35;cursor:not-allowed;}
    .btn-save{background:var(--gray-100);color:var(--gray-600);}
    .btn-save:hover:not(:disabled){background:var(--gray-200);}
    .btn-add-ct{background:#1d4ed8;color:white;}
    .btn-add-ct:hover:not(:disabled){background:#1e40af;}
    .btn-add-pt{background:var(--red);color:white;}
    .btn-add-pt:hover:not(:disabled){background:var(--red-h);}

    /* preparo read-only */
    .preparo-box{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:9px;padding:11px 14px;font-size:13px;color:#166534;line-height:1.7;white-space:pre-wrap;}

    /* qty mini-modal */
    .qty-overlay{position:fixed;inset:0;background:rgba(10,31,68,.62);backdrop-filter:blur(4px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
    .qty-overlay.show{display:flex;}
    .qty-box{background:white;border-radius:18px;padding:28px 24px;max-width:380px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.35);}
    .qty-title{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:4px;}
    .qty-sub{font-size:12px;color:var(--gray-500);margin-bottom:20px;line-height:1.5;font-style:italic;}
    .qty-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
    .qty-opt{padding:13px 16px;border-radius:11px;border:2px solid var(--gray-200);background:var(--gray-50);font-family:inherit;font-size:13px;font-weight:700;color:var(--gray-700);cursor:pointer;text-align:left;transition:all .15s;display:flex;justify-content:space-between;align-items:center;}
    .qty-opt:hover{border-color:var(--navy);background:#eff6ff;color:var(--navy);}
    .qty-opt .qty-price{font-size:14px;font-weight:900;color:var(--navy);}
    .qty-cancel{width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--gray-200);background:white;font-family:inherit;font-size:12px;font-weight:700;color:var(--gray-500);cursor:pointer;transition:all .15s;}
    .qty-cancel:hover{background:var(--gray-100);}

    /* toast */
    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;z-index:2000;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.25);}
    .toast.show{opacity:1;}
    .toast.success{background:var(--green);}
    .toast.error{background:var(--red);}

    /* file input */
    .file-input{display:none;}

    /* ── TABS ── */
    .tabs-bar{display:flex;gap:0;border-bottom:2px solid var(--gray-200);padding:0 24px;background:white;flex-shrink:0;}
    .tab-btn{padding:10px 18px;font-family:inherit;font-size:13px;font-weight:700;color:var(--gray-500);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap;}
    .tab-btn:hover{color:var(--navy);}
    .tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
    .tab-btn .tab-icon{font-size:13px;}

    /* ── PARCEIROS PANEL ── */
    .parceiros-panel{flex:1;overflow-y:auto;padding:24px;display:none;}
    .parceiros-panel.active{display:block;}
    .p-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:860px;margin:0 auto;}
    @media(max-width:700px){.p-grid{grid-template-columns:1fr;}}
    .p-card{background:white;border:1.5px solid var(--gray-200);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:12px;}
    .p-card-title{font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:7px;}
    .p-card-title i{color:var(--teal);}
    .f-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--gray-500);margin-bottom:4px;display:block;}
    .p-select,.p-input{width:100%;border:1.5px solid var(--gray-200);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .2s;}
    .p-select:focus,.p-input:focus{border-color:var(--navy);background:white;box-shadow:0 0 0 3px rgba(10,31,68,.06);}
    .vals-row{display:flex;gap:8px;}
    .val-chip{flex:1;text-align:center;padding:9px 6px;border-radius:9px;background:var(--gray-50);border:1.5px solid var(--gray-100);}
    .val-chip .vc-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--gray-400);}
    .val-chip .vc-val{font-size:16px;font-weight:900;color:var(--navy);}
    .val-chip.guia .vc-val{color:#b45309;}
    .val-chip.resta .vc-val{color:#15803d;}
    .p-partner-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:10px 13px;font-size:12px;color:#1e40af;line-height:1.55;display:none;}
    .p-partner-info.show{display:block;}
    .p-partner-info strong{display:block;font-size:13px;margin-bottom:3px;}
    .p-obs{background:#fff7ed;border:1px solid #fed7aa;border-radius:7px;padding:7px 10px;font-size:11px;color:#92400e;margin-top:4px;line-height:1.5;}
    .msg-area{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:inherit;color:var(--gray-800);min-height:80px;display:none;max-height:340px;overflow-y:auto;}
    .msg-area.show{display:block;}
    .p-btn-row{display:flex;gap:8px;flex-wrap:wrap;}
    .p-btn{padding:9px 16px;border-radius:9px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .p-btn.gerar{background:var(--navy);color:white;}
    .p-btn.gerar:hover{background:var(--navy-mid);}
    .p-btn.copiar{background:var(--green);color:white;display:none;}
    .p-btn.copiar:hover{background:#166534;}
    .p-btn.limpar{background:var(--gray-100);color:var(--gray-600);border:1.5px solid var(--gray-200);}
    .p-btn.limpar:hover{background:var(--gray-200);}

    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
      .cart-panel{border-left:none;border-top:1px solid var(--gray-200);max-height:320px;}
      .s-header{padding:0 16px;}
      .main-content{padding:14px;}
      body{overflow:auto;height:auto;}
      .layout{overflow:visible;}
    }
  </style>
</head>
<body>
  <div class="red-bar"></div>

  <!-- HEADER -->
  <div class="s-header">
    <div class="s-logo">

      <div><div class="s-logo-name">Amor Saúde</div><div class="s-logo-sub">Orçamentos · Pirituba</div></div>
    </div>
    <div class="header-right">
      <div class="user-pill"><div class="user-dot" id="userAvatar">--</div><span id="userName" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span></div>
      <button class="btn-sair" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sair</button>
      <button class="back-btn" onclick="window.location.replace('login.html')"><i class="fas fa-home"></i> Portal</button>
    </div>
  </div>

  <!-- SEARCH SECTION -->
  <div class="search-section">
    <div class="search-row">
      <div class="search-wrap">
        <i class="fas fa-magnifying-glass search-icon"></i>
        <input type="text" id="searchInput" placeholder="Buscar exame, categoria ou fornecedor…" autocomplete="off">
        <button class="clear-btn" id="clearBtn">×</button>
      </div>
      <button class="btn-filtros" id="btnFiltros" onclick="toggleFiltros()">
        <i class="fas fa-sliders"></i> Filtros
        <span class="filtros-badge" id="filtrosBadge">0</span>
      </button>
      <div class="admin-row">
        <input type="file" class="file-input" id="fileInput" accept=".xlsx,.xls">
        <button class="btn-chip-sm" id="importBtn"><i class="fas fa-file-arrow-up"></i> Importar</button>
        <button class="btn-chip-sm" id="loadSeedBtn"><i class="fas fa-database"></i> Base inicial</button>
      </div>
    </div>
    <div class="chips-row" id="categoryChips"></div>
  </div>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" id="tabOrc" onclick="switchTab('orc')">
      <i class="tab-icon fas fa-file-invoice-dollar"></i> Orçamentos
    </button>
    <button class="tab-btn" id="tabParc" onclick="switchTab('parc')">
      <i class="tab-icon fas fa-handshake"></i> Exames Parceiros
    </button>
  </div>

  <!-- MAIN LAYOUT (tab orc) -->
  <div class="layout" id="panelOrc">
    <main class="main-content">
      <div class="results-meta" id="resultsMeta"></div>
      <div id="results"></div>
    </main>

    <!-- CART -->
    <aside class="cart-panel">
      <div class="cart-head">
        <div class="cart-title"><i class="fas fa-clipboard-list"></i> Orçamento <span class="cart-badge" id="cartBadge">0</span></div>
        <button class="cart-clear" id="btnClear">Limpar</button>
      </div>
      <div class="cart-items" id="cartList">
        <div class="cart-empty"><i class="fas fa-clipboard"></i>Nenhum exame adicionado.<br>Clique nos cards para adicionar.</div>
      </div>
      <div class="cart-footer" id="cartFooter" style="display:none;">
        <div class="cart-total-row">
          <span class="cart-total-lbl">Total</span>
          <span class="cart-total-val" id="cartTotal">R$ 0,00</span>
        </div>
        <button class="cart-btn btn-copy" id="btnWpp" disabled>
          <i class="fas fa-copy"></i> Copiar Mensagem
        </button>
        <button class="cart-btn btn-pdf" id="btnPdf" disabled>
          <i class="fas fa-file-pdf"></i> Exportar PDF
        </button>
      </div>
    </aside>
  </div>

  <!-- PAINEL PARCEIROS (tab parc) -->
  <div class="parceiros-panel" id="panelParc">
    <div class="p-grid">

      <!-- Coluna esquerda: seleção -->
      <div class="p-card">
        <div class="p-card-title"><i class="fas fa-hospital"></i> Dados do Encaminhamento</div>

        <div>
          <label class="f-label">Parceiro</label>
          <select id="pSelParceiro" class="p-select" onchange="pOnParceiro()">
            <option value="">— Selecione o parceiro —</option>
            <option value="auri">Auri Medicina</option>
            <option value="cergoli">Cergoli — Lapa</option>
            <option value="imadi">IMADI Imagem</option>
            <option value="medicom">Medicom 2.0</option>
            <option value="prezecor">Prezecor 2.0</option>
            <option value="scoppeta">Scoppeta</option>
            <option value="tc_prezecor">TC Prezecor (Freguesia / Guarulhos)</option>
          </select>
        </div>

        <div>
          <label class="f-label">Exame</label>
          <select id="pSelExame" class="p-select" onchange="pOnExame()">
            <option value="">— Selecione o parceiro primeiro —</option>
          </select>
        </div>

        <div>
          <label class="f-label">Nome do Paciente</label>
          <input type="text" id="pPaciente" class="p-input" placeholder="Ex: Maria da Silva">
        </div>

        <div>
          <label class="f-label">Observação extra (opcional)</label>
          <input type="text" id="pObs" class="p-input" placeholder="Ex: Levar pedido médico, exame em jejum…">
        </div>

        <!-- Info do parceiro -->
        <div id="pInfoBox" class="p-partner-info">
          <strong id="pInfoNome"></strong>
          <span id="pInfoTel"></span>
          <div id="pInfoObs" class="p-obs" style="display:none"></div>
        </div>
      </div>

      <!-- Coluna direita: valores + mensagem -->
      <div class="p-card">
        <div class="p-card-title"><i class="fas fa-comment-dots"></i> Mensagem</div>

        <!-- Chips de valor -->
        <div id="pValsRow" class="vals-row" style="display:none">
          <div class="val-chip">
            <div class="vc-lbl">Valor Total</div>
            <div class="vc-val" id="pChipTotal">—</div>
          </div>
          <div class="val-chip guia">
            <div class="vc-lbl">Guia (aqui)</div>
            <div class="vc-val" id="pChipGuia">—</div>
          </div>
          <div class="val-chip resta">
            <div class="vc-lbl">Restante (parceiro)</div>
            <div class="vc-val" id="pChipResta">—</div>

        <div class="p-btn-row">
          <button class="p-btn gerar" onclick="pGerar()"><i class="fas fa-magic"></i> Gerar Mensagem</button>
          <button class="p-btn copiar" id="pBtnCopiar" onclick="pCopiar()"><i class="fas fa-copy"></i> Copiar</button>
          <button class="p-btn limpar" onclick="pLimpar()"><i class="fas fa-redo"></i> Limpar</button>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- MINI-MODAL: quantidade / bilateral -->
  <div class="qty-overlay" id="qtyOverlay">
    <div class="qty-box">
      <div class="qty-title" id="qtyTitle"></div>
      <div class="qty-sub" id="qtySub"></div>
      <div class="qty-opts" id="qtyOpts"></div>
      <button class="qty-cancel" onclick="qtyClose()"><i class="fas fa-times"></i> Cancelar</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
    import { initializeApp }                                from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }         from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, updateDoc, writeBatch, getDoc }
                                                            from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const _app = initializeApp(window.FIREBASE_CONFIG);
    const auth = getAuth(_app);
    const db   = getFirestore(_app);

    function initialsFor(user) {
      const n = user.displayName || user.email || '';
      return n.split(/[\s@]/).filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '??';
    }

    // ── AUTH ──
    let currentUser = null;
    onAuthStateChanged(auth, user => {
      if (!user) { window.location.replace('login.html'); return; }
      currentUser = user;
      document.getElementById('userAvatar').textContent = initialsFor(user);
      const nome = user.displayName || user.email.split('@')[0];
      document.getElementById('userName').textContent = nome;
      // Botão "Base inicial" visível apenas para admins
      try {
        const perms = JSON.parse(sessionStorage.getItem('perms') || '{}');
        if (!perms.admin) document.getElementById('loadSeedBtn').style.display = 'none';
      } catch(e) {
        document.getElementById('loadSeedBtn').style.display = 'none';
      }
      loadExamsFromFirestore();
    });
    document.getElementById('logoutBtn').addEventListener('click', () =>
      signOut(auth).then(() => window.location.replace('login.html'))
    );

    // ── STATE ──
    let exams = [], filtered = [], cart = [];
    let activeCategory = null, searchQuery = '';

    // ── TOAST ──
    const toastEl = document.getElementById('toast');
    function toast(msg, tipo, ms = 2400) {
      toastEl.textContent = msg;
      toastEl.className = 'toast show' + (tipo ? ' ' + tipo : '');
      setTimeout(() => toastEl.classList.remove('show'), ms);
    }

    // ── FORMAT ──
    const fmtBRL = v => v == null ? '—' : v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    function escapeHtml(s) {
      return (s || '').toString().replace(/[&<>"']/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }
    function normalize(s) {
      return (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    // ── LOAD FROM FIRESTORE ──
    async function loadExamsFromFirestore() {
      document.getElementById('results').innerHTML = '<div class="loader"><div class="spinner"></div><p>Carregando exames…</p></div>';
      try {
        const snap = await getDocs(collection(db, 'orcamentos_exames'));
        exams = [];
        snap.forEach(d => exams.push({ id: d.id, ...d.data() }));
        // Separar exames combinados Holter + MAPA em dois cards independentes
        exams = exams.flatMap(e => {
          const n = normalize(e.nome);
          if (n.includes('holter') && n.includes('mapa')) {
            return [
              { ...e, id: e.id + '_holter', nome: 'Holter 24h' },
              { ...e, id: e.id + '_mapa',   nome: 'MAPA 24h'   }
            ];
          }
          return [e];
        });
        if (exams.length === 0) {
          document.getElementById('results').innerHTML = `
            <div class="empty">
              <i class="fas fa-database"></i>
              <h3>Nenhum exame na base ainda</h3>
              <p>Clique em <strong>Base inicial</strong> para importar os exames pré-cadastrados,<br>ou em <strong>Importar</strong> para carregar sua planilha.</p>
            </div>`;
          document.getElementById('categoryChips').innerHTML = '';
          document.getElementById('resultsMeta').textContent = '';
          return;
        }
        renderCategories();
        applyFilters();
      } catch (e) {
        document.getElementById('results').innerHTML = `<div class="empty"><i class="fas fa-triangle-exclamation"></i><h3>Erro ao carregar</h3><p>${escapeHtml(e.message)}</p></div>`;
      }
    }

    // ── CATEGORIES ──
    function renderCategories() {
      const cats = [...new Set(exams.map(e => e.categoria))].sort();
      const el = document.getElementById('categoryChips');
      el.innerHTML = `<button class="chip ${!activeCategory ? 'active' : ''}" data-cat="">Todos (${exams.length})</button>` +
        cats.map(c => {
          const n = exams.filter(e => e.categoria === c).length;
          return `<button class="chip ${activeCategory === c ? 'active' : ''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)} (${n})</button>`;
        }).join('');
      el.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat || null;
        renderCategories();
        applyFilters();
        atualizarBadgeFiltros();
      }));
    }

    // ── FILTROS TOGGLE ──
    window.toggleFiltros = function() {
      const chips = document.getElementById('categoryChips');
      const btn   = document.getElementById('btnFiltros');
      chips.classList.toggle('open');
      btn.classList.toggle('active');
    };
    function atualizarBadgeFiltros() {
      const badge = document.getElementById('filtrosBadge');
      const btn   = document.getElementById('btnFiltros');
      if (activeCategory) {
        badge.textContent = '1';
        badge.classList.add('show');
        btn.classList.add('active');
      } else {
        badge.classList.remove('show');
        btn.classList.remove('active');
        // Fecha os chips se voltou para "Todos"
        document.getElementById('categoryChips').classList.remove('open');
      }
    }

    // ── SEARCH & FILTER ──
    function applyFilters() {
      const q = normalize(searchQuery);
      filtered = exams.filter(e => {
        if (activeCategory && e.categoria !== activeCategory) return false;
        if (!q) return true;
        const hay = normalize(`${e.nome} ${e.categoria} ${e.fornecedor} ${e.observacao||''} ${e.caracteristica||''}`);
        return q.split(/\s+/).every(t => hay.includes(t));
      });
      renderResults();
    }
    const searchInput = document.getElementById('searchInput');
    const clearBtn    = document.getElementById('clearBtn');
    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      clearBtn.classList.toggle('show', !!searchQuery);
      applyFilters();
    });
    clearBtn.addEventListener('click', () => {
      searchInput.value = ''; searchQuery = '';
      clearBtn.classList.remove('show');
      applyFilters(); searchInput.focus();
    });

    // ── RENDER RESULTS ──
    function renderResults() {
      const meta = document.getElementById('resultsMeta');
      meta.textContent = filtered.length === exams.length
        ? `${exams.length} exames disponíveis`
        : `${filtered.length} de ${exams.length} exames`;
      const el = document.getElementById('results');
      if (filtered.length === 0) {
        el.innerHTML = '<div class="empty"><i class="fas fa-magnifying-glass"></i><h3>Nenhum resultado</h3><p>Tente outros termos ou limpe os filtros.</p></div>';
        return;
      }
      el.innerHTML = `<div class="grid">${filtered.map(e => `
        <div class="card" data-id="${e.id}">
          <span class="cat-tag">${escapeHtml(e.categoria)}</span>
          <div class="card-name">${escapeHtml(e.nome)}</div>
          ${e.fornecedor ? `<div class="card-forn"><i class="fas fa-building" style="font-size:9px;margin-right:3px;"></i>${escapeHtml(e.fornecedor)}</div>` : ''}
          <div class="card-prices">
            <div class="price-box ct">
              <div class="price-lbl">Cartão</div>
              <div class="price-val">${e.preco_ct != null ? fmtBRL(e.preco_ct) : '<span class="price-null">—</span>'}</div>
            </div>
            <div class="price-box pt">
              <div class="price-lbl">Particular</div>
              <div class="price-val">${e.preco_pt != null ? fmtBRL(e.preco_pt) : '<span class="price-null">—</span>'}</div>
            </div>
          </div>
        </div>
      `).join('')}</div>`;
      el.querySelectorAll('.card').forEach(card =>
        card.addEventListener('click', () => openModal(card.dataset.id))
      );
    }

    // ── MODAL ──
    function openModal(id) {
      const e = exams.find(x => x.id === id);
      if (!e) return;
      const prepTxt = getPreparo(e);
      const needsPrompt = examNeedsPrompt(e);
      const ctLabel  = needsPrompt ? `<i class="fas fa-plus"></i> Cartão${e.preco_ct != null ? ' — ' + fmtBRL(e.preco_ct) : ''}` : `<i class="fas fa-plus"></i> Cartão ${e.preco_ct != null ? fmtBRL(e.preco_ct) : ''}`;
      const ptLabel  = needsPrompt ? `<i class="fas fa-plus"></i> Particular${e.preco_pt != null ? ' — ' + fmtBRL(e.preco_pt) : ''}` : `<i class="fas fa-plus"></i> Particular ${e.preco_pt != null ? fmtBRL(e.preco_pt) : ''}`;
      document.getElementById('modalContent').innerHTML = `
        <div class="modal-head">
          <div class="modal-titles">
            <div class="modal-name">${escapeHtml(e.nome)}</div>
            <div class="modal-meta">
              <span class="modal-tag">${escapeHtml(e.categoria)}</span>
              ${e.fornecedor ? `<span class="modal-tag">${escapeHtml(e.fornecedor)}</span>` : ''}
            </div>
          </div>
          <button class="modal-close" id="closeBtn"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <div class="modal-prices">
            <div class="mpbox ct">
              <div class="mpbox-lbl">Cartão de Todos</div>
              <div class="mpbox-val">${e.preco_ct != null ? fmtBRL(e.preco_ct) : '—'}</div>
            </div>
            <div class="mpbox pt">
              <div class="mpbox-lbl">Particular</div>
              <div class="mpbox-val">${e.preco_pt != null ? fmtBRL(e.preco_pt) : '—'}</div>
            </div>
          </div>
          <div class="modal-section">
            <div class="modal-section-lbl" style="display:flex;align-items:center;gap:5px;">
              <i class="fas fa-notes-medical" style="color:var(--teal);font-size:11px;"></i> Preparo
            </div>
            <div class="preparo-box">${escapeHtml(prepTxt)}</div>
          </div>
          ${e.observacao ? `<div class="modal-section"><div class="modal-section-lbl">Observação interna</div><div style="font-size:13px;color:var(--gray-600);padding:8px 10px;background:var(--gray-50);border-radius:8px;line-height:1.5;">${escapeHtml(e.observacao)}</div></div>` : ''}
          <div class="modal-actions">
            <button class="btn-add-ct" id="addCtBtn" ${e.preco_ct == null ? 'disabled' : ''}>${ctLabel}</button>
            <button class="btn-add-pt" id="addPtBtn" ${e.preco_pt == null ? 'disabled' : ''}>${ptLabel}</button>
          </div>
        </div>`;
      document.getElementById('modal').classList.add('show');
      document.getElementById('closeBtn').addEventListener('click', closeModal);
      document.getElementById('addCtBtn').addEventListener('click', () => promptAddToCart(id, 'ct'));
      document.getElementById('addPtBtn').addEventListener('click', () => promptAddToCart(id, 'pt'));
    }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

    // ── PREPARO: retorna texto de preparo para cada exame ──
    function getPreparo(e) {
      if (e.preparo && e.preparo.trim()) return e.preparo.trim();
      const n  = normalize(e.nome);
      const cat = normalize(e.categoria || '');

      if (n.includes('holter'))
        return 'Tomar banho antes e não usar desodorante, creme ou talco na região do tórax.\nVestir roupa confortável e de fácil acesso ao tórax.\nTrazer lista de medicamentos em uso.';
      if (n.includes('mapa'))
        return 'Não praticar atividades físicas intensas durante o exame.\nManter o braço estendido e imóvel durante as medições automáticas.\nTrazer lista de medicamentos em uso.';
      if (n.includes('eletrocardiograma') || n === 'ecg' || n.startsWith('ecg '))
        return 'Sem preparo especial.\nEvitar cremes e loções na região do tórax no dia do exame.';
      if (n.includes('ecocardiograma'))
        return 'Sem preparo especial.\nTrajar roupas confortáveis.\nTrazer lista de medicamentos em uso.';
      if (n.includes('ergometria') || n.includes('teste ergometrico') || n.includes('teste de esforco'))
        return 'Usar tênis e roupas esportivas confortáveis.\nNão realizar refeições pesadas nas 2 horas anteriores.\nSuspender betabloqueadores apenas se orientado pelo médico solicitante.';
      if (n.includes('eletroencefalograma') || n.includes('eeg'))
        return 'Lavar o cabelo no dia do exame (sem condicionador ou gel).\nNão ingerir café, chá, refrigerante ou estimulantes nas 4 horas anteriores.\nDormir menos na noite anterior, se indicado pelo médico.';
      if (n.includes('eletroneuromiografia') || n.includes('eletromiografia') || n.includes('enmg') || n.includes('miografia') || (n.includes('facial') && (n.includes('nervo') || n.includes('eletr'))) || (n.includes('neurolog') && n.includes('membro')))
        return 'Sem preparo especial.\nNão aplicar cremes ou loções na pele do local a ser examinado.\nInformar ao médico sobre uso de anticoagulantes.';
      if (n.includes('potencial') && (n.includes('auditi') || n.includes('bera') || n.includes('peate')))
        return 'Lavar o cabelo no dia do exame (sem condicionador).\nCrianças pequenas podem necessitar de sedação — verificar com o médico com antecedência.\nComparecer com o cabelo limpo e seco.';
      if (n.includes('potencial') && (n.includes('visual') || n.includes('pev')))
        return 'Trazer óculos ou lentes de contato se usar correção visual.\nSem preparo específico necessário.';

      // RM
      if ((n.includes('ressonancia') || /\brm\b/.test(n) || n.includes('angio-rm') || n.includes('colangio-rm') || n.includes('hidro-rm') || n.includes('uroressonancia')) && (n.includes('primovist') || n.includes('contraste')))
        return 'Jejum de 2 horas antes.\nTrazer pedido médico e exames anteriores.\nInformar próteses metálicas, marca-passo ou implantes.\nTrazer creatinina recente (obrigatório para contraste).';
      if (n.includes('ressonancia') || /\brm\b/.test(n) || n.includes('angio-rm') || n.includes('colangio-rm') || n.includes('hidro-rm') || n.includes('uroressonancia'))
        return 'Sem preparo especial.\nRetirar objetos metálicos (brincos, piercing, relógio, cinto).\nInformar ao técnico sobre próteses, marca-passo, implantes cocleares, clipes cirúrgicos ou DIU.';

      // TC
      if ((n.includes('tomografia') || /\btc\b/.test(n) || n.includes('angio-tc') || n.includes('urotomografia')) && (n.includes('angio') || n.includes('abdome') || n.includes('abdominal') || n.includes('torax') || n.includes('tórax') || n.includes('pelve') || n.includes('total')))
        return 'Jejum de 4 horas (para exames com contraste).\nTrazer resultado de creatinina recente.\nTrazer pedido médico e exames anteriores.\nInformar alergias, especialmente a contraste iodado.';
      if (n.includes('tomografia') || /\btc\b/.test(n) || n.includes('angio-tc') || n.includes('urotomografia'))
        return 'Sem preparo especial.\nTrazer pedido médico e exames anteriores.\nRetirar objetos metálicos da região a ser examinada.';

      // Ultrassom
      if ((n.includes('ultrassom') || n.includes('usg') || n.includes('ecografia')) && (n.includes('abdome') || n.includes('hepat') || n.includes('figado') || n.includes('bilio') || n.includes('pancre') || n.includes('baco') || n.includes('renal') || n.includes('rim') || n.includes('vias urin')))
        return 'Jejum de 4 horas antes.\nPara visualização de rim e bexiga: também manter bexiga cheia (beber 1 litro de água 1h antes e não urinar).';
      if ((n.includes('ultrassom') || n.includes('usg') || n.includes('ecografia')) && (n.includes('pelv') || n.includes('utero') || n.includes('útero') || n.includes('ovario') || n.includes('vesical') || n.includes('bexiga')))
        return 'Bexiga cheia: beber 1 litro de água 1 hora antes e não urinar.';
      if (n.includes('transvaginal'))
        return 'Bexiga vazia: urinar antes de entrar no consultório.';
      if ((n.includes('ultrassom') || n.includes('usg') || n.includes('ecografia')) && (n.includes('obstet') || n.includes('morfolog') || n.includes('fetal') || n.includes('gestac') || n.includes('doppler') || n.includes('translucenc')))
        return 'Bexiga semi-cheia: beber meio litro de água 30 minutos antes.\nTrajar roupas confortáveis.\nTrazer carteirinha de pré-natal.';
      if ((n.includes('ultrassom') || n.includes('usg') || n.includes('ecografia')) && (n.includes('mama') || n.includes('tireoide') || n.includes('tireóide') || n.includes('prostata') || n.includes('próstata') || n.includes('escrotal') || n.includes('bolsa') || n.includes('partes moles')))
        return 'Sem preparo especial.\nTrajar roupas confortáveis.';
      if (n.includes('ultrassom') || n.includes('usg') || n.includes('ecografia'))
        return 'Sem preparo especial.\nEm caso de dúvida sobre o tipo de ultrassom, verificar com a recepção.';

      if (n.includes('mamografia'))
        return 'Não usar desodorante, talco ou cremes na axila e região mamária no dia do exame.\nPreferir usar blusa e calça separadas.\nTrazer mamografias anteriores se disponíveis.';

      // Raio-X
      if ((n.includes('raio') || n.includes('radiografia')) && (n.includes('abdome') || n.includes('bario') || n.includes('contraste')))
        return 'Jejum de 4 horas.\nTrajar peças sem botões ou zíperes metálicos na região examinada.';
      if (n.includes('raio') || n.includes('radiografia'))
        return 'Sem preparo especial.\nRetirar adornos metálicos (brincos, colar, piercing) na região a ser examinada.';

      if (n.includes('densitometria'))
        return 'Não realizar exames com contraste nos 7 dias anteriores.\nNão ingerir suplementos de cálcio ou vitamina D no dia do exame.\nInformar peso, altura e data da última menstruação.';
      if (n.includes('espirometria'))
        return 'Não usar broncodilatador nas 4 horas anteriores (salvo orientação médica).\nNão fumar nas 4 horas anteriores.\nEvitar refeições pesadas.\nUsar roupa confortável.';
      if (n.includes('audiometria') || n.includes('impedanciometria') || n.includes('otoneurologico') || n.includes('otoneurológico'))
        return 'Evitar exposição a ruídos intensos nas 12 horas anteriores.\nComparecer com o ouvido limpo (higiene habitual).';
      if (n.includes('endoscopia') || n.includes('esofagoscopia'))
        return 'Jejum rigoroso de 8 horas de sólidos e 4 horas de líquidos claros.\nInformar ao médico sobre uso de anticoagulantes com antecedência.';
      if (n.includes('colonoscopia') || n.includes('retossigmoidoscopia') || n.includes('anuscopia') || n.includes('polipectomia'))
        return 'Preparo intestinal completo: seguir rigorosamente o protocolo indicado pelo médico (dieta líquida + laxante).\nSuspender ferro e aspirina conforme orientação.\nJejum de 6 horas antes.';
      if (n.includes('colposcopia') || n.includes('vulvoscopia'))
        return 'Não realizar o exame durante o período menstrual.\nAbstinência sexual 48 horas antes.\nNão usar cremes, óvulos ou medicamentos vaginais nos 2 dias anteriores.';
      if (n.includes('biopsia') || n.includes('biópsia') || n.includes('paaf') || n.includes('core'))
        return 'Conforme orientação médica específica.\nInformar ao médico sobre uso de anticoagulantes (aspirina, warfarina, rivaroxabana, apixabana) com pelo menos 7 dias de antecedência.';
      if (cat.includes('laborat') || n.includes('hemograma') || n.includes('glicemia') || n.includes('colesterol') || n.includes('trigliceri') || n.includes('tsh') || n.includes('hormonio') || n.includes('coleta'))
        return 'Jejum de 8 a 12 horas (apenas água é permitida).\nInformar todos os medicamentos em uso ao médico.';
      if (n.includes('fundo de olho') || n.includes('mapeamento de retina') || n.includes('angiografia') && cat.includes('oftalmo'))
        return 'Os olhos serão dilatados com colírio — não dirigir após o exame.\nTrazer acompanhante se necessário.\nTrazer óculos e receitas anteriores.';
      if (cat.includes('oftalmo') || n.includes('campo visual') || n.includes('topografia') || n.includes('biometria') || n.includes('tonometria'))
        return 'Sem preparo especial.\nTrazer óculos e receitas anteriores se houver.';

      return 'Sem preparo especial necessário.\nEm caso de dúvida, confirme com a recepção antes de vir ao exame.';
    }

    // ── DETECTA EXAMES COM PROMPT DE QUANTIDADE / BILATERAL ──
    function examNeedsPrompt(e) {
      const n = normalize(e.nome);
      return n.includes('eletroneuromiografia') || n.includes('eletromiografia') ||
             n.includes('enmg') || n.includes('miografia') ||
             (n.includes('potencial') && (n.includes('auditi') || n.includes('bera') || n.includes('peate') || n.includes('visual') || n.includes('pev')));
    }

    // ── PROMPT DE QUANTIDADE / BILATERAL ──
    let _qtyPending = null, _qtyOpts = [];
    function promptAddToCart(id, tipo) {
      const e = exams.find(x => x.id === id);
      if (!e) return;
      if (!examNeedsPrompt(e)) { addToCart(id, tipo); closeModal(); return; }

      const n = normalize(e.nome);
      const preco = tipo === 'ct' ? e.preco_ct : e.preco_pt;
      const f1 = fmtBRL(preco), f2 = fmtBRL(preco * 2);
      const isEMG = n.includes('eletroneuromiografia') || n.includes('eletromiografia') || n.includes('enmg') || n.includes('miografia');

      _qtyPending = { id, tipo };
      _qtyOpts = isEMG
        ? [{ label: '1 membro',  price: f1, mult: 1, suffix: '— 1 Membro'  },
           { label: '2 membros', price: f2, mult: 2, suffix: '— 2 Membros' }]
        : [{ label: 'Unilateral', price: f1, mult: 1, suffix: 'Unilateral' },
           { label: 'Bilateral',  price: f2, mult: 2, suffix: 'Bilateral'  }];

      document.getElementById('qtyTitle').textContent = isEMG ? 'Quantos membros serão examinados?' : 'Unilateral ou Bilateral?';
      document.getElementById('qtySub').textContent   = e.nome;
      document.getElementById('qtyOpts').innerHTML    = _qtyOpts.map((o, i) =>
        `<button class="qty-opt" onclick="qtyConfirm(${i})"><span>${o.label}</span><span class="qty-price">${o.price}</span></button>`
      ).join('');
      document.getElementById('qtyOverlay').classList.add('show');
    }
    window.qtyConfirm = function(idx) {
      if (!_qtyPending) return;
      const { id, tipo } = _qtyPending;
      const opt = _qtyOpts[idx];
      const e   = exams.find(x => x.id === id);
      const label = opt.mult > 1 ? e.nome + ' — ' + opt.suffix : null;
      addToCart(id, tipo, label, opt.mult);
      window.qtyClose(); closeModal();
    };
    window.qtyClose = function() {
      document.getElementById('qtyOverlay').classList.remove('show');
      _qtyPending = null;
    };

    // ── CART ──
    function addToCart(id, tipo, customLabel = null, mult = 1) {
      const e = exams.find(x => x.id === id);
      if (!e) return;
      const preco = tipo === 'ct' ? e.preco_ct : e.preco_pt;
      if (preco == null) return;
      const finalPreco = preco * mult;
      const finalNome  = customLabel || e.nome;
      cart.push({ id, exam: { ...e, nome: finalNome }, tipo, preco: finalPreco });
      renderCart();
      toast(`Adicionado: ${finalNome}`, 'success');
    }
    function removeFromCart(idx) { cart.splice(idx, 1); renderCart(); }

    function renderCart() {
      const list   = document.getElementById('cartList');
      const footer = document.getElementById('cartFooter');
      document.getElementById('cartBadge').textContent = cart.length;
      if (cart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-clipboard"></i>Nenhum exame adicionado.<br>Clique nos cards para adicionar.</div>';
        footer.style.display = 'none';
        document.getElementById('btnWpp').disabled = true;
        document.getElementById('btnPdf').disabled = true;
        return;
      }
      list.innerHTML = cart.map((it, i) => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${escapeHtml(it.exam.nome)}</div>
            <div class="cart-item-tipo">${it.tipo === 'ct' ? 'Cartão de Todos' : 'Particular'}</div>
            <div class="cart-item-preco ${it.tipo}">${fmtBRL(it.preco)}</div>
          </div>
          <button class="cart-rm" data-i="${i}">×</button>
        </div>`).join('');
      list.querySelectorAll('.cart-rm').forEach(b =>
        b.addEventListener('click', () => removeFromCart(+b.dataset.i))
      );
      const total = cart.reduce((s, it) => s + (it.preco || 0), 0);
      document.getElementById('cartTotal').textContent = fmtBRL(total);
      footer.style.display = 'block';
      document.getElementById('btnWpp').disabled = false;
      document.getElementById('btnPdf').disabled = false;
    }

    document.getElementById('btnClear').addEventListener('click', () => {
      if (cart.length && confirm('Limpar todos os exames do orçamento?')) { cart = []; renderCart(); }
    });

    // ── WHATSAPP ──
    document.getElementById('btnWpp').addEventListener('click', () => {
      if (!cart.length) return;

      navigator.clipboard.writeText(msg).then(() => {
        const btn = document.getElementById('btnWpp');

        btn.style.background = '#15803d';

      }).catch(() => {
        // Fallback para navegadores sem permissão de clipboard
        const ta = document.createElement('textarea');
        ta.value = msg; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();

      });

    // ── IMPORT ──
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', async ev => {
      const file = ev.target.files[0];

        ev.target.value = ''; return;
      }
      try {
        const buf = await file.arrayBuffer();
        const wb  = XLSX.read(buf, { type: 'array' });
        const parsed = parseWorkbook(wb);
        if (parsed.length === 0) { toast('Nenhum exame encontrado na planilha', 'error', 3500); return; }
        if (!confirm(`${parsed.length} exames encontrados. Importar agora?`)) return;
        await saveAllExams(parsed);
        toast(`${parsed.length} exames importados!`, 'success', 3000);
        await loadExamsFromFirestore();
      } catch (err) {
        toast('Erro: ' + err.message, 'error', 4000);
      } finally { ev.target.value = ''; }
    });

    document.getElementById('loadSeedBtn').addEventListener('click', async () => {
      if (!confirm('Carregar a base inicial com 589 exames pré-cadastrados?\n\nIsso vai SUBSTITUIR a base atual.')) return;
      try {

        const res = await fetch('exams-seed.json');

        toast(`${seed.length} exames carregados!`, 'success', 3000);
        await loadExamsFromFirestore();
      } catch (err) { toast('Erro: ' + err.message, 'error', 4000); }
    });

    // ── XLSX PARSER ──
    function parsePrice(v) {
      if (v == null || v === '') return null;
      if (typeof v === 'number') return v;
      const m = String(v).trim().match(/(\d{1,3}(?:[\.\s]\d{3})*(?:,\d{1,2})?|\d+(?:[\.,]\d{1,2})?)/);
      if (!m) return null;
      const n = parseFloat(m[1].replace(/\./g, '').replace(',', '.'));
      return isNaN(n) ? null : n;
    }
    function cleanStr(v) { return v == null ? '' : String(v).trim().replace(/\n/g, ' ').replace(/\\n/g, ' '); }
    function looksLikeExamName(s) {
      if (!s || s.length < 3) return false;
      const u = s.toUpperCase();
      const bad = ['NOME DO EXAME','CARTÃO DE TODOS','PARTICULAR','VALOR TOTAL','VALOR GUIA','AGENDAMENTO',
        'OBSERVAÇÃO','PROCEDIMENTO ','PRESTADOR','OBS:','WHATSAPP','CONTRASTE','ENDEREÇO','CNPJ',
        'NÃO AGENDAR','TODOS OS EXAMES','COBRADO','COD ','PROCEDIMENTO P'];
      for (const b of bad) if (u.startsWith(b)) return false;
      if (['NAN','-','.'].includes(u)) return false;
      return true;
    }
    function parseWorkbook(wb) {
      const result = [];
      const skipNames = new Set(['amor cirugias','amor cirugias ']);
      const fornMap = {
        'EXAMES  AMOR SAUDE ':'Amor Saúde','USG ':'USG (Equipe Interna)','IMADI-IMAGEM':'IMADI Imagem',
        'OFTALMO':'Oftalmologia','TC PREZECOR':'Prezecor (TC)','SCOPPETA':'Scoppeta',
        'PREZECOR 2.0':'Prezecor 2.0','DERMATOLOGIA':'Dermatologia',
        'EXAMES LABORATORIAIS ':'Laboratorial','MEDICOM 2.0':'Medicom 2.0',
        'FARAGE - OCULTO':'Farage','MARCUS (UROLOGISTA)':'Marcus (Urologia)',
        'PREZECOR':'Prezecor','MEDICOM':'Medicom','CERGOLI - LAPA':'Cergoli (Lapa)',
        'AURI MEDICINA':'Auri Medicina','VF':'VF Oftalmologia'
      };
      for (const sheetName of wb.SheetNames) {
        const lower = sheetName.toLowerCase();
        if (skipNames.has(lower) || lower.includes('desativada')) continue;
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        if (!rows || rows.length === 0) continue;
        const isAmor = sheetName.toUpperCase().includes('AMOR SAUDE');
        let currentCat = sheetName.trim();
        const fornecedor = fornMap[sheetName] || sheetName.trim();
        if (isAmor) currentCat = 'Geral';
        for (const row of rows) {
          if (!row || row.length === 0) continue;
          const nome = cleanStr(row[0]);
          if (!nome) continue;
          if (isAmor) {
            const ct = parsePrice(row[2]), pt = parsePrice(row[3]);
            if (/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(nome) && ct == null && pt == null) {
              currentCat = nome.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim(); continue;
            }
            if (!looksLikeExamName(nome) || (ct == null && pt == null)) continue;
            result.push({ nome, categoria: currentCat, fornecedor, preco_ct: ct, preco_pt: pt,
              observacao: cleanStr(row[1]), preparo: '', caracteristica: '', beneficio: '' });
          } else {
            const nums = row.map(parsePrice);
            const allNull = nums.slice(1).every(n => n == null);
            if (allNull && looksLikeExamName(nome) && nome.length < 50) {
              if (/RAIO|DIAGN|EXAMES |PROCEDIMENT|RESSON|TOMOG|GINECO|BIOPSIA|GASTRO/i.test(nome)) {
                currentCat = nome; continue;
              }
            }
            if (!looksLikeExamName(nome)) continue;
            const prices = nums.slice(1).filter(n => n != null && n > 0);
            if (prices.length === 0) continue;
            const preco_ct = prices[0];
            const preco_pt = prices.length >= 2 ? Math.max(...prices) : null;
            let obs = '';
            for (const c of row.slice(1).map(cleanStr)) {
              if (c && parsePrice(c) == null && c.length > 5) { obs = c; break; }
            }
            result.push({ nome, categoria: currentCat, fornecedor, preco_ct, preco_pt,
              observacao: obs, preparo: '', caracteristica: '', beneficio: '' });
          }
        }
      }
      result.forEach((e, i) => e.id = `exam_${String(i + 1).padStart(4, '0')}`);
      return result;
    }

    async function saveAllExams(list) {
      const existing = await getDocs(collection(db, 'orcamentos_exames'));
      let cur = writeBatch(db), cnt = 0;
      const delBatches = [];
      existing.forEach(d => { cur.delete(d.ref); if (++cnt >= 400) { delBatches.push(cur); cur = writeBatch(db); cnt = 0; } });
      if (cnt > 0) delBatches.push(cur);
      for (const b of delBatches) await b.commit();
      cur = writeBatch(db); cnt = 0;
      const insBatches = [];
      for (const e of list) {
        const ref = doc(db, 'orcamentos_exames', e.id);
        const { id, ...data } = e;
        cur.set(ref, { ...data, createdAt: new Date().toISOString(), createdBy: currentUser.email });
        if (++cnt >= 400) { insBatches.push(cur); cur = writeBatch(db); cnt = 0; }
      }
      if (cnt > 0) insBatches.push(cur);
      for (const b of insBatches) await b.commit();
    }
  </script>

  /* ── Estado ── */
  let _pParc = null, _pExame = null, _pMsg = '';
  const _fBRL = v => 'R$ ' + parseFloat(v).toFixed(2).replace('.', ',');

  /* ── Seleção de parceiro ── */
  window.pOnParceiro = function() {
    const id = document.getElementById('pSelParceiro').value;
    _pParc = id ? _PARC[id] : null;
    _pExame = null;
    pOcultarMsg();

    const selEx = document.getElementById('pSelExame');
    selEx.innerHTML = '';
    if (!_pParc) {
      selEx.innerHTML = '<option value="">— Selecione o parceiro primeiro —</option>';
      document.getElementById('pInfoBox').classList.remove('show');
      document.getElementById('pValsRow').style.display = 'none';
      return;
    }

    selEx.innerHTML = '<option value="">— Selecione o exame —</option>';
    _pParc.exames.forEach((ex, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = ex.nome;
      selEx.appendChild(o);
    });

    // Info box
    const ib = document.getElementById('pInfoBox');
    ib.classList.add('show');
    document.getElementById('pInfoNome').textContent = '🏥 ' + _pParc.nome;
    const telEl = document.getElementById('pInfoTel');
    telEl.textContent = _pParc.tel ? '📞 ' + _pParc.tel : '';
    const obsEl = document.getElementById('pInfoObs');
    if (_pParc.obs) { obsEl.textContent = _pParc.obs; obsEl.style.display = 'block'; }
    else obsEl.style.display = 'none';

    document.getElementById('pValsRow').style.display = 'none';
  };

  /* ── Seleção de exame ── */
  window.pOnExame = function() {
    const idx = document.getElementById('pSelExame').value;
    if (idx === '' || !_pParc) {
      _pExame = null;
      document.getElementById('pValsRow').style.display = 'none';
      pOcultarMsg(); return;
    }
    _pExame = _pParc.exames[parseInt(idx)];
    document.getElementById('pChipTotal').textContent = _fBRL(_pExame.total);
    document.getElementById('pChipGuia').textContent  = _fBRL(_pExame.guia);
    document.getElementById('pChipResta').textContent = _fBRL(_pExame.resta);
    document.getElementById('pValsRow').style.display = 'flex';
    pOcultarMsg();
  };

  /* ── Gerar mensagem ── */
  window.pGerar = function() {
    if (!_pParc || !_pExame) {
      // reutiliza o toast do sistema de orçamentos
      const toastEl = document.getElementById('toast');
      toastEl.textContent = 'Selecione o parceiro e o exame.';
      toastEl.className = 'toast show error';
      setTimeout(() => toastEl.classList.remove('show'), 2400);
      return;
    }
    const paciente = document.getElementById('pPaciente').value.trim();
    const obs      = document.getElementById('pObs').value.trim();
    const clinica  = sessionStorage.getItem('clinicaNome') || 'Amor Saúde';
    const nomeParceiro = _pParc.nome;
    const tel      = _pParc.tel;
    const nomeExame = _pExame.nome;
    const fTotal   = _fBRL(_pExame.total);
    const fGuia    = _fBRL(_pExame.guia);
    const fResta   = _fBRL(_pExame.resta);
    const saudacao = paciente ? `Olá, *${paciente}*! ` : 'Olá! ';

    let m = `Cuidar da sua saúde é nossa prioridade. 🌸\n\n`;
    m += `${saudacao}Informamos que seu exame de *${nomeExame}* será realizado na clínica parceira *${nomeParceiro}*.\n\n`;
    m += `💰 *Valor Total:* ${fTotal}\n`;
    if (_pExame.guia > 0) {
      m += `📋 *Guia (pagar aqui na ${clinica}):* ${fGuia}\n`;
      m += `🏥 *Valor Restante (${nomeParceiro}):* ${fResta}\n`;
    } else {
      m += `🏥 *Valor (pagar na ${nomeParceiro}):* ${fResta}\n`;
    }
    m += `\n📋 *Passo a passo:*\n\n`;
    if (_pExame.guia > 0) {
      m += `1️⃣ *Guia:* Após o pagamento de *${fGuia}* aqui na ${clinica}, enviaremos a sua guia de encaminhamento (válida por 30 dias e necessária para agendar).\n\n`;
      if (tel && !tel.toLowerCase().includes('confirmar')) {
        m += `2️⃣ *Agendamento:* Com a guia em mãos, ligue para *${tel}* para agendar o melhor horário.\n\n`;
      } else {
        m += `2️⃣ *Agendamento:* Com a guia em mãos, entre em contato com a *${nomeParceiro}* para agendar o melhor horário.\n\n`;
      }
      m += `3️⃣ *No dia do exame:* O valor restante de *${fResta}* deverá ser pago diretamente na recepção da *${nomeParceiro}*.\n`;
    } else {
      if (tel && !tel.toLowerCase().includes('confirmar')) {
        m += `1️⃣ *Agendamento:* Ligue para *${tel}* (${nomeParceiro}) para agendar o melhor horário.\n\n`;
      } else {
        m += `1️⃣ *Agendamento:* Entre em contato com a *${nomeParceiro}* para agendar o melhor horário.\n\n`;
      }
      m += `2️⃣ *No dia do exame:* O valor de *${fResta}* deverá ser pago diretamente na recepção da *${nomeParceiro}*.\n`;
    }
    if (obs) m += `\n📌 *Observação:* ${obs}\n`;
    m += `\nEstamos aqui para cuidar de você com atenção e carinho! 💙`;

    _pMsg = m;
    const area = document.getElementById('pMsgArea');
    area.textContent = m;
    area.classList.add('show');
    document.getElementById('pBtnCopiar').style.display = 'flex';
  };

  /* ── Copiar ── */
  window.pCopiar = function() {
    if (!_pMsg) return;
    const copy = () => {
      const toastEl = document.getElementById('toast');
      toastEl.textContent = 'Mensagem copiada! ✅';
      toastEl.className = 'toast show success';
      setTimeout(() => toastEl.classList.remove('show'), 2200);
      const btn = document.getElementById('pBtnCopiar');
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copiado!';
      setTimeout(() => { btn.innerHTML = orig; }, 2000);
    };
    navigator.clipboard.writeText(_pMsg).then(copy).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = _pMsg; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copy();
    });
  };

  /* ── Limpar ── */
  window.pLimpar = function() {
    document.getElementById('pSelParceiro').value = '';
    document.getElementById('pSelExame').innerHTML = '<option value="">— Selecione o parceiro primeiro —</option>';
    document.getElementById('pPaciente').value = '';
    document.getElementById('pObs').value = '';
    document.getElementById('pInfoBox').classList.remove('show');
    document.getElementById('pValsRow').style.display = 'none';
    _pParc = null; _pExame = null;
    pOcultarMsg();
  };

  function pOcultarMsg() {
    const area = document.getElementById('pMsgArea');
    area.textContent = ''; area.classList.remove('show');
    document.getElementById('pBtnCopiar').style.display = 'none';
    _pMsg = '';
  }
  </script>
</body>
</html>
