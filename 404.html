<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Amor Saúde</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    // GitHub Pages SPA redirect — redireciona para login.html preservando o base path
    (function() {
      var path = window.location.pathname;
      var parts = path.split('/').filter(Boolean);
      var base;
      if (window.location.hostname.includes('github.io') && parts.length > 0) {
        base = '/' + parts[0] + '/';
      } else {
        base = '/';
      }
      window.location.replace(base + 'login.html');
    })();
  </script>
  <style>
    body{margin:0;font-family:'Inter',sans-serif;background:#0A1F44;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;}
    p{color:rgba(255,255,255,.4);font-size:13px;}
  </style>
</head>
<body>
  <p>Redirecionando…</p>
</body>
</html>
